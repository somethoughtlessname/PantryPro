<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pantry Pro</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#243342">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pantry Pro">
<link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --margin: 4px;
  --card-height: 45px;
  --drop-height: 32px;
  --border-width: 3px;
  --border-color: #000;
  --radius: 8px;
  --bg-1: #243342;
  --bg-2: #374151;
  --bg-3: #0f1520;
  --bg-4: #636B76;
  --color-1: #C85A5A;
  --color-4: #48a971;
  --color-4-2: #3a875a;
  --color-10: #ffffff;
  --muted: #9ca3af;
}

html, body {
  width: 100%; min-height: 100vh;
  background: var(--bg-1); color: var(--color-10);
  font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px;
}
body {
  display: flex; flex-direction: column; align-items: center;
  padding: calc(var(--card-height) + var(--margin)) var(--margin) 60px;
}

/* DATA WINDOW */
.data-window {
  display: none;
  position: fixed; top:0; left:0; right:0; bottom:0;
  background: var(--bg-1);
  z-index: 200;
  flex-direction: column;
}
.data-window.open { display: flex; }
.data-window-header {
  height: var(--card-height);
  display: flex; align-items: stretch;
  background: var(--bg-3);
  border-bottom: var(--border-width) solid var(--border-color);
  flex-shrink: 0;
}
.data-window-title {
  flex:1; display:flex; align-items:center; padding:0 12px;
  font-size:11px; font-weight:800; letter-spacing:0.1em; text-transform:uppercase;
}
.data-window-close {
  width:45px; min-width:45px;
  background: #502424; border:none;
  border-left: var(--border-width) solid var(--border-color);
  display:flex; align-items:center; justify-content:center;
  font-size:22px; font-weight:900; color:#fff; cursor:pointer;
}
.data-tabs {
  height: var(--card-height); display:flex; flex-shrink:0;
  border-bottom: var(--border-width) solid var(--border-color);
}
.data-tab {
  flex:1; background:var(--bg-3); border:none;
  border-right: var(--border-width) solid var(--border-color);
  color:var(--muted); font-size:11px; font-weight:800;
  letter-spacing:0.08em; text-transform:uppercase; cursor:pointer;
}
.data-tab:last-child { border-right:none; }
.data-tab.active { background:var(--bg-2); color:var(--color-10); }
.data-body {
  flex:1; overflow-y:auto; padding:var(--margin);
  display:flex; flex-direction:column; gap:var(--margin);
  display:flex; flex-direction:column; gap:var(--margin);
}
.data-textarea {
  flex:1; width:100%;
  background:var(--bg-3); border:var(--border-width) solid var(--border-color);
  border-radius:var(--radius); color:var(--color-10);
  font-size:10px; font-family:monospace; padding:8px;
  outline:none; resize:none; min-height:200px;
}
.data-btn {
  height:var(--drop-height); background:var(--bg-2);
  border:var(--border-width) solid var(--border-color); border-radius:var(--radius);
  color:var(--color-10); font-size:11px; font-weight:800;
  letter-spacing:0.08em; text-transform:uppercase; cursor:pointer;
}
.data-btn.green { background:var(--color-4); color:#000; }
.data-status {
  font-size:10px; font-weight:700; letter-spacing:0.06em;
  text-transform:uppercase; color:var(--color-4); text-align:center;
  min-height:16px;
}


.settings-overlay {
  display: none;
  position: fixed; top:0; left:0; right:0; bottom:0;
  background: rgba(0,0,0,0.8);
  z-index: 150;
}
.settings-overlay.open { display: block; }

.settings-drawer {
  position: fixed; top:0; left:0; bottom:0;
  width: 66.666%;
  background: var(--bg-2);
  border-right: var(--border-width) solid var(--border-color);
  border-radius: 0 var(--radius) var(--radius) 0;
  transform: translateX(-100%);
  transition: transform 0.25s ease;
  z-index: 151;
  display: flex; flex-direction: column;
  overflow: hidden;
}
.settings-drawer.open { transform: translateX(0); }

.settings-header {
  height: var(--card-height);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 12px;
  background: var(--bg-3);
  border-bottom: var(--border-width) solid var(--border-color);
  flex-shrink: 0;
  font-size: 11px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase;
}
.settings-close {
  width: 45px; min-width: 45px; height: 100%;
  background: var(--bg-3);
  border: none;
  border-left: var(--border-width) solid var(--border-color);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700; color: var(--muted);
  cursor: pointer;
}
.settings-body {
  flex: 1; overflow-y: auto;
  padding: var(--margin);
  display: flex; flex-direction: column;
  gap: var(--margin);
}


.header-tab {
  position: fixed; top:0; left:0; right:0;
  height: var(--card-height);
  display: flex;
  border-bottom: var(--border-width) solid var(--border-color);
  z-index: 100;
}
.header-tab-btn {
  flex: 1; background: var(--bg-3); border: none;
  border-right: var(--border-width) solid var(--border-color);
  color: var(--muted); font-size: 10px; font-weight: 800;
  letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer;
}
.header-tab-btn:last-child { border-right: none; }
.header-tab-btn.active { background: var(--bg-2); color: var(--color-10); }

/* APP */
.app { width: 100%; max-width: 540px; display: flex; flex-direction: column; gap: var(--margin); }

.page { display: none; flex-direction: column; gap: 4px; width: 100%; }
.page.active { display: flex; }

/* ADD PANEL */
.add-panel {
  background: var(--bg-2); border: var(--border-width) solid var(--border-color);
  border-radius: var(--radius); padding: var(--margin);
  display: flex; flex-direction: column; gap: var(--margin);
}
.add-panel input {
  width: 100%; height: var(--drop-height);
  background: var(--bg-3); border: var(--border-width) solid var(--border-color);
  border-radius: var(--radius); color: var(--color-10);
  font-size: 12px; font-weight: 600; padding: 0 10px; outline: none;
}
.add-row { display: flex; gap: var(--margin); }
.picker-btn {
  flex: 1; min-width: 0; height: var(--drop-height);
  background: var(--bg-3); border: var(--border-width) solid var(--border-color);
  border-radius: var(--radius); color: var(--color-10);
  font-size: 11px; font-weight: 700; letter-spacing: 0.06em;
  text-transform: uppercase; padding: 0 10px; cursor: pointer;
  display: flex; align-items: center; gap: 7px; overflow: hidden;
}
.picker-dot { width:9px; height:9px; border-radius:50%; border:2px solid #000; flex-shrink:0; }
.picker-label { flex:1; text-align:left; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.picker-arrow { font-size:9px; font-weight:900; color:var(--muted); flex-shrink:0; }
.btn-add {
  height: var(--drop-height); background: var(--color-4); color: #000;
  border: var(--border-width) solid var(--border-color); border-radius: var(--radius);
  font-size: 11px; font-weight: 800; letter-spacing: 0.09em;
  padding: 0 16px; cursor: pointer; text-transform: uppercase; flex-shrink: 0;
}

/* VIEW TOGGLE */
.view-toggle {
  height: var(--drop-height); display: flex;
  border: var(--border-width) solid var(--border-color); border-radius: var(--radius); overflow: hidden;
}
.view-btn {
  flex:1; background:var(--bg-2); border:none;
  border-right:var(--border-width) solid var(--border-color);
  color:var(--muted); font-size:11px; font-weight:800;
  letter-spacing:0.08em; text-transform:uppercase; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:7px;
}
.view-btn:last-child { border-right:none; }
.view-btn.active { background:var(--bg-4); color:var(--color-10); }

/* LIST WRAP */
.list-wrap { display:flex; flex-direction:column; gap:var(--margin); width:100%; }

/* CAT SECTION */
.cat-section { border:var(--border-width) solid var(--border-color); border-radius:var(--radius); overflow:hidden; }
.cat-header {
  height:var(--card-height); display:flex; align-items:center; gap:9px; padding:0 10px;
  background:var(--bg-2); border-bottom:var(--border-width) solid var(--border-color);
  cursor:pointer; user-select:none; flex-shrink:0;
}
.cat-section.ms .cat-header {
  height:var(--drop-height) !important;
  min-height:0 !important;
}
.cat-section.ms .cat-body .item-row {
  height:var(--drop-height);
  min-height:var(--drop-height);
  max-height:var(--drop-height);
}
.cat-section.closed .cat-header { border-bottom:none; }
.cat-section.closed .cat-body  { display:none; }
.cat-dot { width:9px; height:9px; border-radius:50%; border:2px solid #000; flex-shrink:0; }
.cat-label { flex:1; font-size:11px; font-weight:800; letter-spacing:0.1em; text-transform:uppercase; }
.cat-count { font-size:10px; font-weight:700; color:var(--muted); flex-shrink:0; }
.cat-arrow { font-size:8px; color:var(--muted); font-weight:900; transition:transform 0.15s; }
.cat-body { display:flex; flex-direction:column; gap:var(--margin); padding:var(--margin); background:var(--bg-1); }

/* ITEM ROW */
.item-row {
  height:var(--drop-height); display:flex; align-items:stretch;
  border:var(--border-width) solid var(--border-color); border-radius:var(--radius); overflow:hidden; flex-shrink:0;
}
.item-check {
  width:32px; min-width:32px; background:#fff;
  border-right:var(--border-width) solid var(--border-color);
  display:flex; align-items:center; justify-content:center;
  font-size:14px; font-weight:700; cursor:pointer; flex-shrink:0;
}
.item-name {
  flex:1; min-width:0; background:var(--bg-4);
  display:flex; align-items:center; padding:0 8px;
  font-size:10px; font-weight:600;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; cursor:pointer;
}
.item-del {
  width:32px; min-width:32px; background:var(--bg-3); border:none;
  border-left:var(--border-width) solid var(--border-color);
  color:var(--muted); font-size:14px; font-weight:700;
  cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center;
}
.item-del.pending { background:var(--color-10); color:var(--color-1); }

/* EMPTY */
.empty-state {
  min-height:80px; display:flex; align-items:center; justify-content:center;
  font-size:14px; font-weight:500; color:var(--muted); opacity:0.8;
  text-align:center; padding:24px 20px; line-height:1.7;
}

/* FOOTER */
.footer { width:100%; }
.btn-ghost {
  width:100%; height:var(--card-height); background:var(--bg-2); color:var(--muted);
  border:var(--border-width) solid var(--border-color); border-radius:var(--radius);
  font-size:11px; font-weight:800; letter-spacing:0.08em; text-transform:uppercase; cursor:pointer;
}

/* MODAL */
.modal-overlay {
  display:none; position:fixed; top:0; left:0; right:0; bottom:0;
  background:rgba(0,0,0,0.85); z-index:200;
}
.modal-overlay.open { display:block; }
.modal {
  position:absolute; top:var(--margin); left:var(--margin); right:var(--margin); bottom:var(--margin);
  background:var(--bg-2); border:var(--border-width) solid var(--border-color);
  border-radius:var(--radius); display:flex; flex-direction:column; overflow:hidden;
}
.modal-header {
  height:var(--card-height); display:flex; align-items:stretch;
  background:var(--bg-3);
  border-bottom:var(--border-width) solid var(--border-color); flex-shrink:0;
  overflow:hidden;
}
.modal-title {
  flex:1; display:flex; align-items:center; padding:0 12px;
  font-size:11px; font-weight:800; letter-spacing:0.1em; text-transform:uppercase;
}
.modal-close {
  width:45px; min-width:45px;
  background:#502424;
  border-left:var(--border-width) solid var(--border-color);
  display:flex; align-items:center; justify-content:center;
  font-size:22px; font-weight:900; color:#fff;
  cursor:pointer; flex-shrink:0;
}
.modal-close:hover { background:#6b2f2f; }
.modal-grid {
  display:grid; grid-template-columns:1fr 1fr; gap:var(--margin);
  padding:var(--margin); overflow-y:auto; flex:1; background:var(--bg-1); align-content:start;
}
.modal-cat-btn {
  height:var(--drop-height); background:var(--bg-2);
  border:var(--border-width) solid var(--border-color); border-radius:var(--radius);
  font-size:10px; font-weight:800; letter-spacing:0.08em; text-transform:uppercase;
  padding:0; cursor:pointer; display:flex; align-items:stretch; overflow:hidden; color:var(--color-10);
}
.modal-cat-btn.sel-active { border-color:var(--cat-color,#5A8DB8); background:var(--bg-3); }
.modal-cat-btn.sel-pending { border-color:var(--cat-color,#5A8DB8); background:var(--bg-4); }
.modal-cat-label {
  flex:1; display:flex; align-items:center; justify-content:center;
  padding:0 8px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.modal-del-sq {
  width:32px; min-width:32px; background:var(--bg-3);
  border-left:var(--border-width) solid var(--border-color);
  display:flex; align-items:center; justify-content:center;
  font-size:14px; font-weight:700; color:var(--muted); cursor:pointer; flex-shrink:0;
}
.modal-del-sq.pending { background:var(--color-10); color:var(--color-1); }
.add-cat-panel {
  grid-column:1/-1; background:var(--bg-2);
  border:var(--border-width) solid var(--border-color); border-radius:var(--radius);
  padding:var(--margin); display:flex; flex-direction:column; gap:var(--margin);
}
.add-cat-input {
  height:var(--drop-height); background:var(--bg-3);
  border:var(--border-width) solid var(--border-color); border-radius:var(--radius);
  color:var(--color-10); font-size:10px; font-weight:700; letter-spacing:0.06em;
  padding:0 8px; outline:none; width:100%; text-transform:uppercase;
}
.swatches { display:flex; flex-wrap:wrap; gap:var(--margin); }
.swatch { width:24px; height:24px; border-radius:50%; border:3px solid #000; cursor:pointer; }
.swatch.active { border-color:#fff; }
.add-cat-btn {
  height:var(--drop-height); background:var(--bg-3);
  border:var(--border-width) solid var(--border-color); border-radius:var(--radius);
  color:var(--color-10); font-size:10px; font-weight:800; letter-spacing:0.08em;
  text-transform:uppercase; cursor:pointer;
}

.simple-cat-divider {
  display:flex; align-items:center; gap:8px;
  padding:6px 4px 2px;
  flex-shrink:0;
}
.simple-cat-divider-line {
  flex:1; height:var(--border-width); background:var(--border-color);
}
.simple-cat-divider-label {
  font-size:9px; font-weight:800; letter-spacing:0.12em; text-transform:uppercase;
  flex-shrink:0;
}


#csThinkSlot, #msThinkSlot, #glThinkSlot, #ptThinkSlot {
  display: flex; flex-direction: column;
  gap: var(--margin);
}
#csThinkSlot:empty, #msThinkSlot:empty, #glThinkSlot:empty, #ptThinkSlot:empty {
  display: none;
}
.thinking-dots span {
  animation: thinkDot 1.2s infinite;
  opacity: 0;
}
.thinking-dots span:nth-child(2) { animation-delay: 0.4s; }
.thinking-dots span:nth-child(3) { animation-delay: 0.8s; }
@keyframes thinkDot {
  0%, 100% { opacity: 0; }
  50%       { opacity: 1; }
}

.ms-search-wrap {
  display:flex; align-items:stretch;
  height:var(--drop-height);
  border:var(--border-width) solid var(--border-color);
  border-radius:var(--radius); overflow:hidden;
}
.ms-search {
  flex:1; min-width:0;
  background: #c8cdd4; border:none;
  color: #1a1a1a;
  font-size:13px; font-weight:600;
  padding:0 10px; outline:none;
}
.ms-search::placeholder { color: #6b7280; }
.ms-search-clear {
  width:32px; min-width:32px;
  background: #8896a8; border:none;
  border-left:var(--border-width) solid var(--border-color);
  color:#fff; font-size:16px; font-weight:700;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
}


.cs-section { border:var(--border-width) solid var(--border-color); border-radius:var(--radius); overflow:hidden; }
.cs-header {
  height:var(--card-height); display:flex; align-items:stretch;
  background:var(--bg-2); border-bottom:var(--border-width) solid var(--border-color);
  cursor:pointer; user-select:none; overflow:hidden;
}
.cs-section.closed .cs-header { border-bottom:none; }
.cs-section.closed .cs-body { display:none; }
.cs-header-main {
  flex:1; min-width:0; display:flex; flex-direction:column;
  justify-content:center; padding:0 10px; gap:0;
  overflow:hidden;
}
.cs-item-name { font-size:11px; font-weight:800; letter-spacing:0.08em; text-transform:uppercase; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.cs-item-sub  { font-size:9px; font-weight:700; color:var(--color-4); letter-spacing:0.04em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.cs-unit-badge { font-size:9px; font-weight:700; color:var(--muted); }
.cs-header-right { display:flex; align-items:center; gap:8px; padding-right:10px; flex-shrink:0; }
.cs-arrow { font-size:8px; color:var(--muted); font-weight:900; }
.cs-del-sq {
  width:32px; min-width:32px; background:var(--bg-3);
  border-left:var(--border-width) solid var(--border-color);
  display:flex; align-items:center; justify-content:center;
  font-size:14px; font-weight:700; color:var(--muted); cursor:pointer; flex-shrink:0;
}
.cs-del-sq.pending { background:var(--color-10); color:var(--color-1); }
.cs-body { display:flex; flex-direction:column; gap:var(--margin); padding:var(--margin); background:var(--bg-1); }
.cs-entry {
  display:flex; flex-direction:column;
  border:var(--border-width) solid var(--border-color);
  border-radius:5px; overflow:hidden; flex-shrink:0;
}
.cs-entry-top {
  height:var(--drop-height); display:flex; align-items:stretch;
}
.cs-entry-sale {
  height:var(--drop-height); display:flex; align-items:stretch;
  border-top:var(--border-width) solid var(--border-color);
}
.cs-sale-saving {
  flex: 1 1 0; min-width:0; background:var(--bg-3);
  display:flex; align-items:center; justify-content:center;
  font-size:10px; font-weight:700; color:var(--color-4);
  border-right:var(--border-width) solid var(--border-color);
}
.cs-sale-price {
  flex: 1 1 0; min-width:0; background:var(--bg-2);
  display:flex; align-items:center; justify-content:center;
  font-size:10px; font-weight:700; color:var(--color-4);
  border-right:var(--border-width) solid var(--border-color);
}
.cs-sale-enddate {
  flex: 1 1 0; min-width:0; background:var(--bg-3);
  display:flex; align-items:center; justify-content:center;
  font-size:10px; font-weight:700; color:var(--muted);
}
.cs-store {
  flex: 1 1 0; min-width:0; background:var(--bg-4);
  display:flex; align-items:center; padding:0 8px;
  font-size:10px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  border-right:var(--border-width) solid var(--border-color);
}
.cs-up {
  flex: 1 1 0; min-width:0; background:var(--bg-2);
  display:flex; align-items:center; justify-content:center;
  font-size:10px; font-weight:700;
  border-right:var(--border-width) solid var(--border-color);
}
.cs-up.best { background:var(--color-4); color:#000; }
.cs-up.tied { background:var(--color-4-2); color:var(--color-10); }
.cs-date {
  flex: 1 1 0; min-width:0; background:var(--bg-3);
  display:flex; align-items:center; justify-content:center;
  font-size:10px; font-weight:700; color:var(--muted);
  border-right:var(--border-width) solid var(--border-color);
}
.cs-entry-del {
  width:32px; min-width:32px; background:var(--bg-3); border:none;
  display:flex; align-items:center; justify-content:center;
  font-size:14px; font-weight:700; color:var(--muted); cursor:pointer; flex-shrink:0;
}
.cs-entry-del.pending { background:var(--color-10); color:var(--color-1); }
.cs-divider {
  height:0; border-bottom:var(--border-width) solid var(--border-color);
  margin:0 calc(-1 * var(--margin)); width:calc(100% + 2 * var(--margin));
}
.cs-add-row {
  height:var(--drop-height); display:flex;
  border:var(--border-width) solid var(--border-color); border-radius:5px; overflow:hidden; flex-shrink:0;
}
.cs-input {
  background:var(--bg-3); border:none;
  border-right:var(--border-width) solid var(--border-color);
  color:var(--color-10); font-size:10px; font-weight:600;
  padding:0 6px; outline:none; height:100%;
}
.cs-input-store { flex:2; min-width:0; }
.cs-input-qty   { flex:1; min-width:0; text-align:center; }
.cs-input-price { flex:1; min-width:0; text-align:center; }
.cs-add-btn {
  width:32px; min-width:32px; background:var(--color-4); border:none;
  color:#000; font-size:16px; font-weight:900; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
.cs-sale-trigger {
  width:44px; min-width:44px; background:var(--bg-3);
  border-left:var(--border-width) solid var(--border-color);
  display:flex; align-items:center; justify-content:center;
  font-size:8px; font-weight:900; letter-spacing:0.08em;
  color:var(--color-4); cursor:pointer; flex-shrink:0;
}
.cs-sale-trigger:hover { background:var(--bg-2); }
.cs-sale-card {
  height:var(--drop-height); display:flex; align-items:stretch;
  border:var(--border-width) solid var(--border-color);
  border-radius:5px; overflow:hidden; flex-shrink:0;
}
.cs-sale-label {
  width:48px; min-width:48px; background:var(--bg-3);
  display:flex; align-items:center; justify-content:center;
  font-size:8px; font-weight:900; letter-spacing:0.1em;
  color:var(--color-4); border-right:var(--border-width) solid var(--border-color);
  flex-shrink:0;
}
.cs-sale-up {
  flex:1; background:var(--bg-2);
  display:flex; align-items:center; justify-content:center;
  font-size:10px; font-weight:800; color:var(--color-4);
  border-right:var(--border-width) solid var(--border-color);
}
.cs-sale-ends {
  width:72px; min-width:72px; background:var(--bg-3);
  display:flex; align-items:center; justify-content:center;
  font-size:9px; font-weight:600; color:var(--muted);
  border-right:var(--border-width) solid var(--border-color); flex-shrink:0;
}
.cs-sale-del {
  width:32px; min-width:32px; background:var(--bg-3); border:none;
  display:flex; align-items:center; justify-content:center;
  font-size:14px; font-weight:700; color:var(--muted); cursor:pointer; flex-shrink:0;
}
.cs-sale-del.pending { background:var(--color-10); color:var(--color-1); }
.cs-sale-add-row {
  height:var(--drop-height); display:flex;
  border:var(--border-width) solid var(--border-color);
  border-radius:5px; overflow:hidden; flex-shrink:0;
}
.cs-entry-edit {
  width:32px; min-width:32px; background:var(--bg-3);
  border-right:var(--border-width) solid var(--border-color);
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:900; color:var(--muted);
  cursor:pointer; flex-shrink:0; letter-spacing:-1px;
}
.cs-entry-edit.pending { background:var(--bg-4); color:var(--color-10); }

.unit-picker-btn {
  flex:1; min-width:0; height:var(--drop-height);
  background:var(--bg-3); border:var(--border-width) solid var(--border-color);
  border-radius:var(--radius); color:var(--color-10);
  font-size:11px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase;
  padding:0 10px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:7px;
}
/* ── PANTRY TAB ── */
#pagePantry {
  flex-direction: column; gap: var(--margin);
  overflow-y: auto;
}
.pt-card {
  border: 3px solid #000;
  border-radius: 8px; overflow: hidden; flex-shrink: 0;
  width: 100%;
}
.pt-main {
  height: 32px !important;
  min-height: 32px !important;
  max-height: 32px !important;
  box-sizing: border-box;
  display: flex; align-items: stretch;
  position: relative; overflow: hidden; cursor: pointer;
}
.pt-btn {
  width: 32px; min-width: 32px; max-width: 32px;
  height: 32px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 700;
  z-index: 2; flex-shrink: 0; cursor: pointer;
  border: none; background: var(--bg-3); color: var(--color-10);
  position: relative; box-sizing: border-box;
}
.pt-btn.left  { border-right: 3px solid #000; }
.pt-btn.right { border-left:  3px solid #000; }
.pt-center {
  flex: 1; height: 32px; box-sizing: border-box;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 2; position: relative;
  pointer-events: none; background: var(--bg-2); overflow: hidden;
}
.pt-name {
  font-size: 10px; font-weight: 700; text-align: center;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 100%; padding: 0 6px; line-height: 1; margin: 0;
}
.pt-value {
  font-size: 8px; font-weight: 600; letter-spacing: 0.04em;
  color: rgba(255,255,255,0.7); text-align: center; line-height: 1; margin: 0;
}
.pt-expand {
  background: var(--bg-3); overflow: hidden;
  max-height: 0; transition: max-height 0.3s ease;
}
.pt-expand.open {
  max-height: 600px;
  border-top: var(--border-width) solid var(--border-color);
}
.pt-graph {
  height: 80px; display: flex; align-items: flex-end;
  padding: 8px 10px 6px; gap: 4px;
}
.pt-bar-wrap {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: flex-end; gap: 3px; cursor: pointer;
}
.pt-bar { width: 100%; border-radius: 2px 2px 0 0; min-height: 2px; }
.pt-day { font-size: 6px; font-weight: 600; color: var(--muted); }
</style>
</head>
<body>

<div class="header-tab">
  <button class="header-tab-btn active" id="hGrocery" onclick="setPage('Grocery')">Grocery List</button>
  <button class="header-tab-btn" id="hPantry" onclick="setPage('Pantry')">My Pantry</button>
  <button class="header-tab-btn" id="hShop" onclick="setPage('Shop')">Comp Shop</button>
  <button class="header-tab-btn" id="hMyShop" onclick="setPage('MyShop')">My Store</button>
</div>

<div class="app">

  <!-- GROCERY LIST -->
  <div class="page active" id="pageGrocery">
    <div class="ms-search-wrap">
      <input type="text" id="glSearch" class="ms-search" placeholder="Search... type to find or add a new list item" oninput="glSearchInput()">
      <button class="ms-search-clear" onclick="document.getElementById('glSearch').value='';glThinkPhraseSet=false;glQuickAddState=null;glQuickAddName='';glThinkCardEl=null;glRender();">×</button>
    </div>
    <div id="glThinkSlot"></div>
    <div class="add-panel" id="glAddPanel">
      <input type="text" id="glInput" placeholder="item name…" maxlength="80">
      <div class="add-row">
        <button class="picker-btn" id="glCatBtn" onclick="openModal('gl')">
          <span class="picker-label" id="glCatLabel"></span>
          <span class="picker-arrow">▼</span>
        </button>
        <button class="btn-add" onclick="glAdd()">+ Add</button>
      </div>
    </div>
    <div class="view-toggle">
      <button class="view-btn active" id="vSimple" onclick="setView('simple')">Simple</button>
      <button class="view-btn" id="vCat" onclick="setView('cat')">Category</button>
    </div>
    <div class="list-wrap" id="glList"></div>
    <div class="footer">
      <button class="btn-ghost" id="glFooterBtn" onclick="glFooterAction()">Uncheck All</button>
    </div>
  </div>

  <!-- MY PANTRY -->
  <div class="page" id="pagePantry">
    <div class="ms-search-wrap">
      <input type="text" id="ptSearch" class="ms-search" placeholder="Search... type to find or add an item" oninput="ptSearchInput()">
      <button class="ms-search-clear" onclick="document.getElementById('ptSearch').value='';ptThinkPhraseSet=false;ptQuickAddState=null;ptQuickAddName='';ptThinkCardEl=null;ptRender();">×</button>
    </div>
    <div id="ptThinkSlot"></div>
  </div>

  <!-- COMP SHOP -->
  <div class="page" id="pageShop">
    <div class="ms-search-wrap">
      <input type="text" id="csSearch" class="ms-search" placeholder="Search... type to find or add a new list item" oninput="csSearchInput()">
      <button class="ms-search-clear" onclick="document.getElementById('csSearch').value='';csThinkPhraseSet=false;csQuickAddState=null;csQuickAddName='';csRender();">×</button>
    </div>
    <div class="view-toggle">
      <button class="view-btn active" id="csVSimple" onclick="setCsView('simple')">Simple</button>
      <button class="view-btn" id="csVCat" onclick="setCsView('cat')">Category</button>
    </div>
    <div id="csThinkSlot"></div>
    <div class="list-wrap" id="csList"></div>
  </div>

  <!-- MY SHOP -->
  <div class="page" id="pageMyShop">
    <div class="ms-search-wrap">
      <input type="text" id="msSearch" class="ms-search" placeholder="Search... type to find or add a new list item" oninput="msSearchInput()">
      <button class="ms-search-clear" onclick="document.getElementById('msSearch').value='';msThinkPhraseSet=false;msQuickAddState=null;msQuickAddName='';msRender();">×</button>
    </div>
    <div class="add-panel" id="msAddPanel">
      <input type="text" id="msInput" placeholder="item name…" maxlength="80">
      <div class="add-row">
        <button class="picker-btn" id="msCatBtn" onclick="openModal('ms')">
          <span class="picker-label" id="msCatLabel"></span>
          <span class="picker-arrow">▼</span>
        </button>
        <button class="btn-add" onclick="msAdd()">+ Add</button>
      </div>
    </div>
    <div id="msThinkSlot"></div>
    <div class="list-wrap" id="msList"></div>
  </div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Category</div>
      <div class="modal-close" onclick="closeModal()">×</div>
    </div>
    <div class="modal-grid" id="modalGrid"></div>
  </div>
</div>

<!-- SETTINGS DRAWER -->
<div class="settings-overlay" id="settingsOverlay" onclick="closeSettings()"></div>
<div class="settings-drawer" id="settingsDrawer">
  <div class="settings-header">
    <span style="flex:1;text-align:center;">Settings</span>
  </div>
  <div class="settings-body" id="settingsBody"></div>
</div>

<!-- DATA WINDOW -->
<div class="data-window" id="dataWindow">
  <div class="data-window-header">
    <div class="data-window-title" id="dataWindowTitle">Data</div>
    <button class="data-window-close" onclick="closeDataWindow()">×</button>
  </div>
  <div class="data-tabs">
    <button class="data-tab active" id="dtExport" onclick="setDataTab('export')">Export</button>
    <button class="data-tab" id="dtImport" onclick="setDataTab('import')">Import</button>
  </div>
  <div class="data-body" id="dataBody"></div>
</div>

<!-- CLEAR CONFIRM MODAL -->
<div class="modal-overlay" id="clearConfirmOverlay" onclick="if(event.target===this)document.getElementById('clearConfirmOverlay').classList.remove('open')">
  <div class="modal" style="bottom:auto;max-height:220px;">
    <div class="modal-header">
      <div class="modal-title">Clear All Data</div>
      <div class="modal-close" onclick="document.getElementById('clearConfirmOverlay').classList.remove('open')">×</div>
    </div>
    <div style="padding:12px;display:flex;flex-direction:column;gap:var(--margin);">
      <div style="font-size:11px;font-weight:600;letter-spacing:0.04em;color:var(--muted);line-height:1.5;">
        This will permanently delete all grocery list items, My Store items, Comp Shop data, and all custom categories and settings. This cannot be undone.
      </div>
      <div style="display:flex;gap:var(--margin);">
        <button class="data-btn" style="flex:1;" onclick="document.getElementById('clearConfirmOverlay').classList.remove('open')">Cancel</button>
        <button class="data-btn" style="flex:1;background:var(--color-1);color:#fff;" onclick="clearAllData()">Clear Everything</button>
      </div>
    </div>
  </div>
</div>

<!-- SALES WINDOW -->
<div class="data-window" id="salesWindow">
  <div class="data-window-header">
    <div class="data-window-title">My Sales</div>
    <button class="data-window-close" onclick="closeSalesWindow()">×</button>
  </div>
  <div class="data-body" id="salesBody"></div>
</div>

<script>
'use strict';

/* ── STORAGE ── */
function ls(k,def){ try{ const v=localStorage.getItem(k); return v!==null?JSON.parse(v):def; }catch(e){ return def; } }
function lsSet(k,v){ localStorage.setItem(k,JSON.stringify(v)); }

/* ── CATEGORIES ── */
const DEFAULT_CATS = [
  {id:'other',      label:'Other',      color:'#7c94a4'},
  {id:'produce',    label:'Produce',    color:'#30a85a'},
  {id:'dairy',      label:'Dairy',      color:'#347ab8'},
  {id:'meat',       label:'Meat',       color:'#d94f4f'},
  {id:'seafood',    label:'Seafood',    color:'#18a898'},
  {id:'deli',       label:'Deli',       color:'#d97f30'},
  {id:'bakery',     label:'Bakery',     color:'#bf6015'},
  {id:'pasta',      label:'Pasta',      color:'#d4c030'},
  {id:'grains',     label:'Grains',     color:'#b8a018'},
  {id:'pantry',     label:'Pantry',     color:'#9f4a08'},
  {id:'canned',     label:'Canned',     color:'#a8b8c4'},
  {id:'condiments', label:'Condiments', color:'#e8a055'},
  {id:'spices',     label:'Spices',     color:'#c03535'},
  {id:'frozen',     label:'Frozen',     color:'#0a8878'},
  {id:'snacks',     label:'Snacks',     color:'#e8d54a'},
  {id:'cereal',     label:'Cereal',     color:'#7c58a8'},
  {id:'drinks',     label:'Drinks',     color:'#1c5c9a'},
  {id:'alcohol',    label:'Alcohol',    color:'#5e3888'},
  {id:'health',     label:'Health',     color:'#1a8a3e'},
  {id:'baby',       label:'Baby',       color:'#e07aa8'},
  {id:'pets',       label:'Pets',       color:'#5c9ed4'},
  {id:'cleaning',   label:'Cleaning',   color:'#5c9ed4'},
  {id:'personal',   label:'Personal',   color:'#b0306a'},
];
const ROOT_COLORS = [
  { name:'Red',    shades:['#f4a0a0','#e87070','#d94f4f','#c03535','#a02020','#7a1010'] },
  { name:'Coral',  shades:['#f4b8a0','#e89070','#d96840','#c04820','#9a3010','#721c06'] },
  { name:'Orange', shades:['#f4c08a','#e8a055','#d97f30','#bf6015','#9f4a08','#7a3400'] },
  { name:'Brown',  shades:['#d4b896','#b89060','#96683a','#7a4c22','#5e3410','#3e2008'] },
  { name:'Olive',  shades:['#d4d090','#bcb85a','#a0a030','#848418','#686808','#4c4c04'] },
  { name:'Yellow', shades:['#f5e87a','#e8d54a','#d4c030','#b8a018','#927c08','#6e5c00'] },
  { name:'Green',  shades:['#90e0b0','#58c880','#30a85a','#1a8a3e','#0e6c28','#074e18'] },
  { name:'Teal',   shades:['#80ddd5','#44c4b8','#18a898','#0a8878','#056860','#024844'] },
  { name:'Blue',   shades:['#90c4e8','#5c9ed4','#347ab8','#1c5c9a','#0e4278','#062c55'] },
  { name:'Purple', shades:['#c0aadc','#a080c4','#7c58a8','#5e3888','#44206c','#2c1050'] },
  { name:'Pink',   shades:['#f0a8c8','#e07aa8','#cc5088','#b0306a','#8c1850','#640a38'] },
  { name:'Grey',   shades:['#d0d8e0','#a8b8c4','#7c94a4','#587488','#385468','#1e384a'] },
];
const DEFAULT_UNITS=[
  {id:'unit',label:'Unit'},{id:'lb',label:'Pound'},{id:'oz',label:'Ounce'},
  {id:'g',label:'Gram'},{id:'kg',label:'Kilogram'},{id:'ml',label:'Milliliter'},
  {id:'l',label:'Liter'},{id:'floz',label:'Fluid Ounce'},{id:'each',label:'Each'},{id:'dozen',label:'Dozen'},
];

function getCats(){
  const del=ls('cat_deleted',[]), custom=ls('cat_custom',[]);
  const ov=ls('cat_color_overrides',{});
  const base=[DEFAULT_CATS[0],...DEFAULT_CATS.slice(1).filter(c=>!del.includes(c.id)),...custom];
  return base.map(c=>ov[c.id]?{...c,color:ov[c.id]}:c);
}
function getCat(id){
  const ov=ls('cat_color_overrides',{});
  const cat=getCats().find(c=>c.id===id)||DEFAULT_CATS[0];
  return ov[cat.id]?{...cat,color:ov[cat.id]}:cat;
}
function getCatColor(id, fallback){
  const ov=ls('cat_color_overrides',{});
  return ov[id]||fallback||'#9ca3af';
}
function getUnits(){
  const del=ls('unit_deleted',[]), custom=ls('unit_custom',[]);
  return [DEFAULT_UNITS[0],...DEFAULT_UNITS.slice(1).filter(u=>!del.includes(u.id)),...custom];
}
function getUnit(id){ return getUnits().find(u=>u.id===id)||DEFAULT_UNITS[0]; }

/* ── PAGE SWITCHING ── */
function setPage(p){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.header-tab-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById('page'+p).classList.add('active');
  document.getElementById('h'+p).classList.add('active');
  // clear search bars and quick-add state
  const gl=document.getElementById('glSearch'); if(gl) gl.value='';
  glQuickAddState=null; glQuickAddName=''; glThinkPhraseSet=false; glThinkCardEl=null;
  const cs=document.getElementById('csSearch'); if(cs) cs.value='';
  msQuickAddState=null; msQuickAddName=''; msThinkPhraseSet=false; msThinkCardEl=null;
  csQuickAddState=null; csQuickAddName=''; csThinkPhraseSet=false; csThinkCardEl=null;
  glOpenState={}; csOpenState={}; msOpenState={};
  if(p==='Grocery') glRender();
  if(p==='Pantry'){ ptCardRegistry.forEach(c=>c.close()); ptCardRegistry=[]; ptOpenSet.clear(); ptActiveFilter='all'; ptViewMode='pantry'; const pts=document.getElementById('ptSearch'); if(pts) pts.value=''; ptThinkPhraseSet=false; ptQuickAddState=null; ptQuickAddName=''; ptThinkCardEl=null; ptRender(); }
  if(p==='Shop'){ csInvalidateSortCache(); csRender(); }
  if(p==='MyShop'){ msInvalidateSortCache(); msRender(); }
}

/* ── MODAL ── */
let modalCtx=null, modalSelPend=null;
const modalDelPend=new Set();
let selectedRootIdx=0;
let newCatColor=ROOT_COLORS[0].shades[2];
let editingColorCatId=null;

function openModal(ctx){
  modalCtx=ctx; modalSelPend=null; modalDelPend.clear();
  editingColorCatId=null; selectedRootIdx=0; newCatColor=ROOT_COLORS[0].shades[2];
  document.getElementById('modalTitle').textContent=ctx==='unit'?'Unit':'Category';
  buildModalGrid();
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){
  document.getElementById('modalOverlay').classList.remove('open');
  if(modalCtx==='ms-quickadd'){ window._msQuickAddName=null; msQuickAddState='confirm'; msRender(); }
  if(modalCtx==='gl-quickadd'){ window._glQuickAddName=null; glQuickAddState='confirm'; glRender(); }
  if(modalCtx==='cs-quickadd-cat'){ csQuickAddState='confirm'; csRender(); }
  if(modalCtx==='cs-quickadd-unit'){ csQuickAddState='pick-unit'; csRender(); }
  if(modalCtx==='pt-quickadd-cat'){ ptQuickAddState='confirm'; const q=(document.getElementById('ptSearch')?.value||'').trim(); ptRenderThinkSlot(q); }
  if(modalCtx==='pt-quickadd-unit'){ ptQuickAddState='pick-unit'; const q=(document.getElementById('ptSearch')?.value||'').trim(); ptRenderThinkSlot(q); }
  modalCtx=null; modalSelPend=null; editingColorCatId=null;
}
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

function getUsedColors(){ return getCats().map(c=>c.color.toLowerCase()); }

function updateCatColor(catId, color){
  const custom=ls('cat_custom',[]);
  const ci=custom.findIndex(c=>c.id===catId);
  if(ci>-1){ custom[ci].color=color; lsSet('cat_custom',custom); }
  else { const ov=ls('cat_color_overrides',{}); ov[catId]=color; lsSet('cat_color_overrides',ov); }
  glRender(); msRender();
}

function buildModalGrid(){
  const grid=document.getElementById('modalGrid');
  grid.innerHTML='';
  grid.style.gridTemplateColumns='1fr 1fr';
  const isUnit = modalCtx==='unit' || modalCtx==='ms-unit' || modalCtx==='cs-quickadd-unit' || modalCtx==='pt-quickadd-unit';
  const list=isUnit?getUnits():getCats();

  let curSel;
  if(modalCtx==='unit') curSel=csSelectedUnit;
  else if(modalCtx==='ms-unit'){ const it=ls('ms_items',[]).find(i=>i.id===msEditItemId); curSel=it?.unit||'unit'; }
  else if(modalCtx==='ms-cat'){ const it=ls('ms_items',[]).find(i=>i.id===msEditItemId); curSel=it?.category||'other'; }
  else if(modalCtx==='cs-quickadd-unit') curSel=csQuickAddUnit||'unit';
  else if(modalCtx==='pt-quickadd-unit') curSel=ptQuickAddUnit||'unit';
  else if(modalCtx==='pt-quickadd-cat') curSel=ptQuickAddCat||'other';
  else if(modalCtx==='cs-quickadd-cat') curSel=csQuickAddCat||'other';
  else curSel=modalCtx==='gl'?glSelectedCat:msSelectedCat;

  list.forEach(item=>{
    const isSel=item.id===curSel, isPend=modalSelPend===item.id;
    const isDelPend=modalDelPend.has(item.id);
    const isDeletable=item.id!=='other'&&item.id!=='unit';

    const btn=document.createElement('button');
    btn.className='modal-cat-btn'+(isSel?' sel-active':'')+(isPend?' sel-pending':'');
    const catColor = getCatColor(item.id, item.color);
    if(!isUnit) btn.style.setProperty('--cat-color',catColor);
    if(item.id==='other'||item.id==='unit') btn.style.gridColumn='1/-1';

    const lbl=document.createElement('span');
    lbl.className='modal-cat-label';
    if(!isUnit) lbl.style.color=catColor;
    lbl.textContent=item.label;
    btn.appendChild(lbl);

    btn.onclick=e=>{
      if(e.target.closest('.modal-del-sq')) return;
      if(isUnit){
        if(modalSelPend===item.id){
          modalSelPend=null;
          if(modalCtx==='ms-unit'){ msSetUnit(msEditItemId,item.id); closeModal(); }
          else if(modalCtx==='cs-quickadd-unit'){ csQuickAddUnit=item.id; closeModal(); csQuickAddState='done'; csQuickAddFinalise(); }
          else if(modalCtx==='pt-quickadd-unit'){ ptQuickAddUnit=item.id; closeModal(); ptQuickAddState='done'; ptQuickAddFinalise(); }
          else { csSelectedUnit=item.id; updateUnitBtn(); closeModal(); }
        } else {
          modalSelPend=item.id; buildModalGrid();
          setTimeout(()=>{ if(modalSelPend===item.id){ modalSelPend=null; buildModalGrid(); } },2000);
        }
      } else {
        if(modalSelPend===item.id){
          modalSelPend=null;
          if(modalCtx==='gl-quickadd'){
            const name=window._glQuickAddName||'';
            if(name){
              const newItem={id:'gl_'+Date.now()+Math.random(),name,category:item.id,checked:false};
              const gl=ls('gl_items',[]); gl.push(newItem); lsSet('gl_items',gl);
              msPopulate(name,item.id);
              trackCatUsage(item.id);
              window._glQuickAddName=null; glQuickAddState='success'; glQuickAddName='';
              closeModal(); glRender();
            }
          } else if(modalCtx==='ms-quickadd'){            const name=window._msQuickAddName||'';
            if(name){
              const newItem={id:'ms_'+Date.now()+Math.random(),name,category:item.id,unit:'unit'};
              const ms=ls('ms_items',[]); ms.push(newItem); lsSet('ms_items',ms);
              window._msQuickAddName=null; msQuickAddState='success'; msQuickAddName='';
              closeModal(); msRender();
            }
          } else if(modalCtx==='cs-quickadd-cat'){
            csQuickAddCat=item.id; closeModal(); csQuickAddState='pick-unit'; csRender();
          } else if(modalCtx==='pt-quickadd-cat'){
            ptQuickAddCat=item.id; closeModal(); ptQuickAddState='pick-unit'; const q=(document.getElementById('ptSearch')?.value||'').trim(); ptRenderThinkSlot(q);
          } else if(modalCtx==='ms-cat'){ msSetCat(msEditItemId,item.id); closeModal(); }
          else if(modalCtx==='gl'){ glSelectedCat=item.id; updateGlBtn(); closeModal(); }
          else { msSelectedCat=item.id; updateMsBtn(); closeModal(); }
        } else {
          modalSelPend=item.id;
          editingColorCatId=item.id;
          selectedRootIdx=0;
          buildModalGrid();
          setTimeout(()=>{ if(modalSelPend===item.id){ modalSelPend=null; editingColorCatId=null; buildModalGrid(); } },4000);
        }
      }
    };

    if(isDeletable){
      const d=document.createElement('div');
      d.className='modal-del-sq'+(isDelPend?' pending':'');
      d.textContent='×';
      d.onclick=e=>{
        e.stopPropagation();
        if(modalDelPend.has(item.id)){
          modalDelPend.delete(item.id);
          if(isUnit) deleteUnit(item.id); else deleteCat(item.id);
        } else {
          modalDelPend.add(item.id); buildModalGrid();
          setTimeout(()=>{ modalDelPend.delete(item.id); buildModalGrid(); },2000);
        }
      };
      btn.appendChild(d);
    }
    grid.appendChild(btn);
  });

  // Add panel
  const panel=document.createElement('div');
  panel.className='add-cat-panel';
  const inp=document.createElement('input');
  inp.className='add-cat-input';
  inp.placeholder=isUnit?'New unit label…':'New category name…';
  inp.maxLength=30;
  panel.appendChild(inp);

  if(!isUnit){
    // panel title
    if(editingColorCatId){
      const editLbl=document.createElement('div');
      const editCat=getCat(editingColorCatId);
      editLbl.style.cssText='font-size:10px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:'+editCat.color+';';

      panel.appendChild(editLbl);
    }
    // root color dots row
    const rootRow=document.createElement('div'); rootRow.className='swatches'; rootRow.style.justifyContent='space-between';
    ROOT_COLORS.forEach((root,ri)=>{
      const s=document.createElement('div');
      s.className='swatch'+(selectedRootIdx===ri?' active':'');
      s.style.background=root.shades[2];
      s.style.border='3px solid '+(selectedRootIdx===ri?'#fff':'#000');
      s.onclick=()=>{ selectedRootIdx=ri; buildModalGrid(); };
      rootRow.appendChild(s);
    });
    panel.appendChild(rootRow);

    // divider
    const div=document.createElement('div');
    div.style.cssText='height:0;border-bottom:var(--border-width) solid var(--border-color);margin:2px 0;';
    panel.appendChild(div);

    // shade dots for selected root
    const used=getUsedColors();
    const shadeRow=document.createElement('div'); shadeRow.className='swatches'; shadeRow.style.justifyContent='space-between';
    ROOT_COLORS[selectedRootIdx].shades.forEach(shade=>{
      const isUsed=used.includes(shade.toLowerCase()) && shade.toLowerCase()!==newCatColor.toLowerCase();
      const s=document.createElement('div');
      s.style.cssText=`width:24px;height:24px;border-radius:50%;background:${shade};border:3px solid ${shade===newCatColor.toLowerCase()||shade.toLowerCase()===newCatColor.toLowerCase()?'#fff':'#000'};cursor:${isUsed?'default':'pointer'};position:relative;display:flex;align-items:center;justify-content:center;flex-shrink:0;`;
      if(isUsed){
        const x=document.createElement('span'); x.textContent='×';
        x.style.cssText='color:#fff;font-size:16px;font-weight:900;line-height:1;';
        s.appendChild(x);

        s.onclick=()=>{
          newCatColor=shade;
          if(editingColorCatId){
            updateCatColor(editingColorCatId,shade);
            editingColorCatId=null; modalSelPend=null;
          }
          buildModalGrid();
        };
      }
      shadeRow.appendChild(s);
    });
    panel.appendChild(shadeRow);
  }

  const addBtn=document.createElement('button');
  addBtn.className='add-cat-btn';
  addBtn.textContent=isUnit?'+ Add Unit':'+ Add Category';

    if(isUnit){ const c=ls('unit_custom',[]); c.push({id:'cu_'+Date.now(),label:name}); lsSet('unit_custom',c); }
    else { const c=ls('cat_custom',[]); c.push({id:'cc_'+Date.now(),label:name,color:newCatColor}); lsSet('cat_custom',c); }
    inp.value=''; buildModalGrid();
  };
  panel.appendChild(addBtn);
  grid.appendChild(panel);
}

function deleteCat(id){
  const gl=ls('gl_items',[]); gl.forEach(i=>{ if(i.category===id) i.category='other'; }); lsSet('gl_items',gl);
  const ms=ls('ms_items',[]); ms.forEach(i=>{ if(i.category===id) i.category='other'; }); lsSet('ms_items',ms);
  const custom=ls('cat_custom',[]);
  if(custom.find(c=>c.id===id)){ lsSet('cat_custom',custom.filter(c=>c.id!==id)); }
  else { const d=ls('cat_deleted',[]); if(!d.includes(id)){d.push(id);lsSet('cat_deleted',d);} }
  if(glSelectedCat===id){ glSelectedCat='other'; updateGlBtn(); }
  if(msSelectedCat===id){ msSelectedCat='other'; updateMsBtn(); }
  buildModalGrid(); glRender(); msRender();
}

function deleteUnit(id){
  // update ms_items that use this unit to fallback
  const ms=ls('ms_items',[]); ms.forEach(i=>{ if(i.unit===id) i.unit='unit'; }); lsSet('ms_items',ms);
  const custom=ls('unit_custom',[]);
  if(custom.find(u=>u.id===id)){ lsSet('unit_custom',custom.filter(u=>u.id!==id)); }
  else { const d=ls('unit_deleted',[]); if(!d.includes(id)){d.push(id);lsSet('unit_deleted',d);} }
  if(csSelectedUnit===id){ csSelectedUnit='unit'; updateUnitBtn(); }
  buildModalGrid(); csRender();
}

function buildCatSection(cat,items,stage,onHeader,buildBody,headerHeight){
  const section=document.createElement('div');
  section.className='cat-section'+(stage===0?' closed':'');

  const header=document.createElement('div');
  header.className='cat-header';
  if(headerHeight) header.style.height=headerHeight;
  header.onclick=onHeader;

  const lbl=document.createElement('div'); lbl.className='cat-label'; lbl.style.color=cat.color; lbl.textContent=cat.label;
  const cnt=document.createElement('div'); cnt.className='cat-count'; cnt.textContent=items.length;
  const arr=document.createElement('div'); arr.className='cat-arrow'; arr.textContent='▼';
  if(stage===0) arr.style.transform='rotate(-90deg)';
  header.append(lbl,cnt,arr);
  section.appendChild(header);

  if(stage>0){
    const body=document.createElement('div'); body.className='cat-body';
    buildBody(body);
    section.appendChild(body);
  }
  return section;
}

let smartSort = ls('setting_smart_sort', true);

function trackCatUsage(catId){
  const usage = ls('cat_usage', {});
  usage[catId] = (usage[catId]||0) + 1;
  lsSet('cat_usage', usage);
}

let csCachedSortedCats = null;
let csSortedCatIds = null;
let msSortedCatIds = null;

function csInvalidateSortCache(){
  csCachedSortedCats = null;
  csSortedCatIds = null;
}

function msInvalidateSortCache(){
  msSortedCatIds = null;
}

function msGetSortedCats(){
  if(!msSortedCatIds){
    const sorted = smartSortCats([...getCats()].sort((a,b)=>a.label.localeCompare(b.label)));
    msSortedCatIds = sorted.map(c=>c.id);
  }
  const allCats = getCats();
  return msSortedCatIds.map(id=>allCats.find(c=>c.id===id)).filter(Boolean);
}

function csGetSortedCats(displayItems){
  // build the locked order once per tab visit
  if(!csSortedCatIds){
    const sorted = smartSortCats(getCats());
    csSortedCatIds = sorted.map(c=>c.id);
  }
  // return cats in locked order, filtered to only those with items
  const allCats = getCats();
  return csSortedCatIds
    .map(id=>allCats.find(c=>c.id===id))
    .filter(c=>c && displayItems.some(i=>i.category===c.id));
}

function smartSortCats(cats){
  if(!smartSort) return cats;
  const usage = ls('cat_usage', {});
  return [...cats].sort((a,b) => {
    const diff = (usage[b.id]||0) - (usage[a.id]||0);
    if(diff !== 0) return diff;
    return a.label.localeCompare(b.label); // alphabetical tiebreak
  });
}

let glQuickAddState = null;
let glQuickAddName = '';

function glPickNextThinkPhrase(){
  const available = MS_THINK_PHRASES.filter(p=>p!==glCurrentThinkPhrase);
  glCurrentThinkPhrase = available[Math.floor(Math.random()*available.length)];
  glThinkCardEl = null;
}

function glGetOrCreateThinkCard(){
  if(glThinkCardEl) return glThinkCardEl;
  const card=document.createElement('div');
  card.style.cssText=`height:var(--drop-height);display:flex;border:var(--border-width) solid var(--border-color);border-radius:var(--radius);overflow:hidden;flex-shrink:0;`;

  const phraseText=(glCurrentThinkPhrase||MS_THINK_PHRASES[0]).replace(/[.…]+$/,'');
  txt.innerHTML=phraseText+'<span class="thinking-dots" style="font-style:normal;margin-left:1px;"><span>.</span><span>.</span><span>.</span></span>';
  card.appendChild(txt);
  glThinkCardEl=card;
  return card;
}

function glSearchInput(){
  clearTimeout(glSearchIdleTimer);
  const q=(document.getElementById('glSearch')?.value||'').trim();
  if(!q){ glThinkPhraseSet=false; glQuickAddState=null; glQuickAddName=''; glThinkCardEl=null; glRender(); return; }
  if(glQuickAddState && glQuickAddState!=='pick-cat'){
    glQuickAddState=null; glThinkCardEl=null; glPickNextThinkPhrase();
  }
  if(!glThinkPhraseSet){ glPickNextThinkPhrase(); glThinkPhraseSet=true; }
  glRender();
  glSearchIdleTimer=setTimeout(()=>{
    const allMsItems=ls('ms_items',[]);
    const qWords=q.toLowerCase().split(/\s+/);
    const exists=allMsItems.some(i=>{ const nw=i.name.toLowerCase().split(/\s+/); return qWords.every(qw=>nw.includes(qw)); });
    glQuickAddState=exists?'found':'confirm';
    glQuickAddName=q;
    glRender();
  },2000);
}

    // also check exact match against ms_items for idle timer
    const exactExistsInMs=msItems.some(i=>{ const nw=i.name.toLowerCase().split(/\s+/); return glQuery.split(/\s+/).every(qw=>nw.includes(qw)); });

    results.forEach(msItem=>{

  }

  if(items.length > 0) GL_LAST_EMPTY = false;
  if(items.length===0){ showEmpty(container, glEmptyMsg()); return; }

  if(glViewMode==='simple'){
    const activeCats = getCats().filter(c=>items.some(i=>i.category===c.id));
    activeCats.forEach(cat=>{

  }

  getCats().filter(c=>items.some(i=>i.category===c.id)).forEach(cat=>{
    const catItems=items.filter(i=>i.category===cat.id);
    const uc=catItems.filter(i=>!i.checked).sort((a,b)=>a.name.localeCompare(b.name));
    const ch=catItems.filter(i=>i.checked).sort((a,b)=>a.name.localeCompare(b.name));
    const rawStage=glGetStage(cat.id,uc.length,ch.length);
    // if we're in "unchecked only" mode but none are left, collapse

let csSelectedUnit='unit';
let csOpenState={};
let csViewMode=ls('cs_view','simple');
const csItemDelPend=new Set(), csEntDelPend=new Set();

function setCsView(v){
  csViewMode=v; lsSet('cs_view',v);
  csOpenState={};
  document.getElementById('csVSimple').classList.toggle('active',v==='simple');
  document.getElementById('csVCat').classList.toggle('active',v==='cat');
  csRender();
}

function updateUnitBtn(){
  const el=document.getElementById('csUnitLabel');
  if(el) el.textContent=getUnit(csSelectedUnit).label;
}


function csDeleteItem(id){
  // items now managed via My Store — just remove entries
  csItemDelPend.delete(id);
  lsSet('cs_entries',ls('cs_entries',[]).filter(e=>e.itemId!==id));
  csRender();
}

function csAddEntry(itemId,store,qty,price,salePrice,saleEnds){
  if(!store||!qty||!price) return;
  const entries=ls('cs_entries',[]);
  if(csEditingId){
    const idx=entries.findIndex(e=>e.id===csEditingId);
    if(idx>-1){
      entries[idx].store=store; entries[idx].qty=parseFloat(qty);
      entries[idx].price=parseFloat(price); entries[idx].updated=Date.now();
      if(salePrice&&saleEnds) entries[idx].sale={price:parseFloat(salePrice),ends:saleEnds};
      lsSet('cs_entries',entries); csEditingId=null; csRender(); return;
    }
    csEditingId=null;
  }
  const entry={id:'cse_'+Date.now(),itemId,store,qty:parseFloat(qty),price:parseFloat(price),updated:Date.now()};
  if(salePrice&&saleEnds) entry.sale={price:parseFloat(salePrice),ends:saleEnds};
  entries.push(entry); lsSet('cs_entries',entries); csRender();
}

function csDeleteEntry(id){
  csEntDelPend.delete(id);
  lsSet('cs_entries',ls('cs_entries',[]).filter(e=>e.id!==id));
  csRender();
}

const csEditPend = new Set();
let csEditingId = null;

function csEditEntry(entryId, itemId){
  const entries = ls('cs_entries',[]);
  const entry = entries.find(e=>e.id===entryId);
  if(!entry) return;
  csEditingId = entryId;

  requestAnimationFrame(()=>{
    const storeInp = document.querySelector('input[data-item-id="'+itemId+'"]');
    const qtyInp   = document.querySelector('input[data-qty-id="'+itemId+'"]');
    const priceInp = document.querySelector('input[data-price-id="'+itemId+'"]');
    const spInp    = document.querySelector('input[data-sale-price-id="'+itemId+'"]');
    const edInp    = document.querySelector('input[data-sale-end-id="'+itemId+'"]');
    if(storeInp) storeInp.value = entry.store;
    if(qtyInp)   qtyInp.value   = entry.qty;
    if(priceInp) priceInp.value = entry.price;
    if(spInp&&entry.sale)  spInp.value = entry.sale.price;
    if(edInp&&entry.sale)  edInp.value = entry.sale.ends;
  });
}



function getCsStage(id){ return csOpenState[id]!==undefined?csOpenState[id]:0; }

function csToggle(id){
  const cur=getCsStage(id);
  if(cur===0){
    // only close other item-level keys, not category keys
    Object.keys(csOpenState).forEach(k=>{ if(!k.startsWith('cat_')) csOpenState[k]=0; });
    csOpenState[id]=1;
  } else {
    csOpenState[id]=0;
  }
  csRender();
}

const csSaleDelPend = new Set();
const csSaleAddOpen = new Set(); // entry IDs where sale add form is showing

function isSaleActive(entry){
  if(!entry.sale) return false;
  const parts = entry.sale.ends.split('-');
  const end = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]), 23, 59, 59, 999);
  return new Date() <= end;
}

function csGetEffectiveUp(entry){
  if(isSaleActive(entry)) return entry.sale.price / entry.qty;
  return entry.qty > 0 ? entry.price / entry.qty : null;
}

function csPurgeSales(){
  const entries = ls('cs_entries',[]);
  let changed = false;
  entries.forEach(e=>{
    if(e.sale && !isSaleActive(e)){ delete e.sale; changed=true; }
  });
  if(changed) lsSet('cs_entries', entries);
}

function csDeleteSale(entryId){
  csSaleDelPend.delete(entryId);
  const entries = ls('cs_entries',[]);
  const e = entries.find(e=>e.id===entryId);
  if(e){ delete e.sale; lsSet('cs_entries', entries); }
  csRender();
}

function csAddSale(entryId, salePrice, endsStr){
  if(!salePrice || !endsStr) return;
  const entries = ls('cs_entries',[]);
  const e = entries.find(e=>e.id===entryId);
  if(e){
    e.sale = { price: parseFloat(salePrice), ends: endsStr };
    lsSet('cs_entries', entries);
  }
  csSaleAddOpen.delete(entryId);
  csRender();
}

function csPickNextThinkPhrase(){
  const available = MS_THINK_PHRASES.filter(p=>p!==csCurrentThinkPhrase);
  csCurrentThinkPhrase = available[Math.floor(Math.random()*available.length)];
  csThinkCardEl = null;
}

function csGetOrCreateThinkCard(){
  if(csThinkCardEl) return csThinkCardEl;
  const card=document.createElement('div');
  card.style.cssText=`height:var(--drop-height);display:flex;border:var(--border-width) solid var(--border-color);border-radius:var(--radius);overflow:hidden;flex-shrink:0;`;

  const phraseText=csCurrentThinkPhrase.replace(/[.…]+$/,'');
  txt.innerHTML=phraseText+'<span class="thinking-dots" style="font-style:normal;margin-left:1px;"><span>.</span><span>.</span><span>.</span></span>';
  card.appendChild(txt);
  csThinkCardEl=card;
  return card;
}

function csSearchInput(){
  clearTimeout(csSearchIdleTimer);
  clearInterval(csThinkTimer);
  const q=(document.getElementById('csSearch')?.value||'').trim();
  if(!q){ csThinkPhraseSet=false; csQuickAddState=null; csQuickAddName=''; csThinkCardEl=null; csRender(); return; }
  // if user types again after idle fired, reset back to thinking
  if(csQuickAddState && csQuickAddState!=='pick-cat' && csQuickAddState!=='pick-unit'){
    csQuickAddState=null; csThinkCardEl=null; csPickNextThinkPhrase();
  }
  if(!csThinkPhraseSet){ csPickNextThinkPhrase(); csThinkPhraseSet=true; }
  csRender();
  csSearchIdleTimer=setTimeout(()=>{
    clearInterval(csThinkTimer);
    const allItems=ls('ms_items',[]);
    const qWords=q.toLowerCase().split(/\s+/);
    const exists=allItems.some(i=>{ const nw=i.name.toLowerCase().split(/\s+/); return qWords.every(qw=>nw.includes(qw)); });
    csQuickAddState=exists?'found':'confirm';
    csQuickAddName=q;
    csRender();
  },2000);
}

function csOpenUnitModalForQuickAdd(){
  modalCtx='cs-quickadd-unit'; modalSelPend=null; modalDelPend.clear();
  document.getElementById('modalTitle').textContent='Unit';
  buildModalGrid();
  document.getElementById('modalOverlay').classList.add('open');
}

function csOpenCatModalForQuickAdd(){
  modalCtx='cs-quickadd-cat'; modalSelPend=null; modalDelPend.clear();

}

function csQuickAddFinalise(){
  if(!csQuickAddName || !csQuickAddCat || !csQuickAddUnit) return;
  const newItem={id:'ms_'+Date.now()+Math.random(), name:csQuickAddName, category:csQuickAddCat, unit:csQuickAddUnit};
  const ms=ls('ms_items',[]); ms.push(newItem); lsSet('ms_items',ms);
  csQuickAddState='success'; csQuickAddName=''; csQuickAddCat=null; csQuickAddUnit=null;
  csThinkPhraseSet=false; csThinkCardEl=null;
  csRender(); msRender();
}

function csRender(){
  csPurgeSales();
  const container=document.getElementById('csList'); container.innerHTML='';
  const items=ls('ms_items',[]), entries=ls('cs_entries',[]);
  if(items.length===0){ showEmpty(container,'Add items in My Store first.'); return; }

  const csVS=document.getElementById('csVSimple'), csVC=document.getElementById('csVCat');
  const viewToggle=document.querySelector('#pageShop .view-toggle');
  const csQuery=(document.getElementById('csSearch')?.value||'').trim().toLowerCase();

  // hide view tabs while searching
  if(viewToggle) viewToggle.style.display=csQuery?'none':'';
  if(csVS) csVS.classList.toggle('active',csViewMode==='simple');
  if(csVC) csVC.classList.toggle('active',csViewMode==='cat');

  const csThinkSlot=document.getElementById('csThinkSlot');

  // manage think slot — both think card and qa card go here
  if(csThinkSlot){
    if(csQuery && !csQuickAddState){
      const card=csGetOrCreateThinkCard();
      if(!csThinkSlot.contains(card)){ csThinkSlot.innerHTML=''; csThinkSlot.appendChild(card); }
    } else if(csQuery && csQuickAddState && csQuickAddState!=='done'){
      csThinkSlot.innerHTML='';
      const displayName=document.getElementById('csSearch')?.value.trim()||csQuery;
      const queryWords=csQuery.split(/\s+/);
      const exactExists=items.some(i=>{ const nw=i.name.toLowerCase().split(/\s+/); return queryWords.every(qw=>nw.includes(qw)); });

      const qaCard=document.createElement('div');
      qaCard.style.cssText=`height:var(--drop-height);display:flex;border:var(--border-width) solid var(--border-color);border-radius:var(--radius);overflow:hidden;flex-shrink:0;`;

      if(csQuickAddState==='success'){
        const ph=MS_SUCCESS_PHRASES[Math.floor(Math.random()*MS_SUCCESS_PHRASES.length)];
        const txt=document.createElement('div');
        txt.style.cssText='flex:1;background:var(--bg-2);display:flex;align-items:center;padding:0 10px;font-size:10px;font-weight:600;color:var(--color-4);';
        txt.textContent=ph; qaCard.appendChild(txt);
      } else if(exactExists || csQuickAddState==='found'){
        const ph=MS_FOUND_PHRASES[Math.floor(Math.random()*MS_FOUND_PHRASES.length)];
        const txt=document.createElement('div');
        txt.style.cssText='flex:1;background:var(--bg-2);display:flex;align-items:center;padding:0 10px;font-size:10px;font-weight:600;color:var(--color-4);';
        txt.textContent=ph; qaCard.appendChild(txt);
      } else if(csQuickAddState==='confirm'){
        const txt=document.createElement('div');
        txt.style.cssText='flex:1;min-width:0;background:var(--bg-2);display:flex;align-items:center;padding:0 10px;font-size:10px;font-weight:600;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;';
        txt.innerHTML=`Add <strong style="color:var(--color-10);margin:0 4px;">"${displayName}"</strong> to Comp Shop?`;
        const yesBtn=document.createElement('div');
        yesBtn.style.cssText='width:48px;min-width:48px;background:#347ab8;border-left:var(--border-width) solid var(--border-color);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;letter-spacing:0.08em;text-transform:uppercase;color:#fff;cursor:pointer;flex-shrink:0;';
        yesBtn.textContent='YES!';
        yesBtn.onclick=e=>{ e.stopPropagation(); csQuickAddName=displayName; csQuickAddState='pick-cat'; csRender(); };
        qaCard.append(txt,yesBtn);
      } else if(csQuickAddState==='pick-cat'){
        const txt=document.createElement('div');
        txt.style.cssText='flex:1;min-width:0;background:var(--bg-2);display:flex;align-items:center;padding:0 10px;font-size:10px;font-weight:600;color:var(--muted);';
        txt.textContent='Pick your category';
        const okBtn=document.createElement('div');
        okBtn.style.cssText='width:48px;min-width:48px;background:var(--color-4);border-left:var(--border-width) solid var(--border-color);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;letter-spacing:0.08em;text-transform:uppercase;color:#000;cursor:pointer;flex-shrink:0;';
        okBtn.textContent='OK!';
        okBtn.onclick=e=>{ e.stopPropagation(); csOpenCatModalForQuickAdd(); };
        qaCard.append(txt,okBtn);
      } else if(csQuickAddState==='pick-unit'){
        const txt=document.createElement('div');
        txt.style.cssText='flex:1;min-width:0;background:var(--bg-2);display:flex;align-items:center;padding:0 10px;font-size:10px;font-weight:600;color:var(--muted);';
        txt.textContent='Choose your unit of measurement';
        const ofBtn=document.createElement('div');
        ofBtn.style.cssText='width:64px;min-width:64px;background:#7c58a8;border-left:var(--border-width) solid var(--border-color);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;letter-spacing:0.06em;text-transform:uppercase;color:#fff;cursor:pointer;flex-shrink:0;text-align:center;padding:0 4px;';
        ofBtn.textContent='OF COURSE!';
        ofBtn.onclick=e=>{ e.stopPropagation(); csOpenUnitModalForQuickAdd(); };
        qaCard.append(txt,ofBtn);
      }
      csThinkSlot.appendChild(qaCard);
    } else {
      csThinkSlot.innerHTML='';
    }
  }

  // filter items by search
  let displayItems=items;
  if(csQuery){
    displayItems=items.filter(i=>{ const ws=i.name.toLowerCase().split(/\s+/); return ws.some(w=>w.startsWith(csQuery)); });
    // show as simple flat list, no category dividers
    const cats=csGetSortedCats(displayItems);
    cats.forEach(cat=>{
      const catItems=displayItems.filter(i=>i.category===cat.id);
      catItems.forEach(item=>container.appendChild(buildCsItem(item)));
    });
    return;
  }

  if(displayItems.length===0){ showEmpty(container,'Add items in My Store first.'); return; }
  const cats=csGetSortedCats(displayItems);

  // shared: build a full cs item section (header + body)
  function buildCsItem(item){
    const unit=getUnit(item.unit);
    const itemEntries=entries.filter(e=>e.itemId===item.id);
    const stage=getCsStage(item.id);
    const sorted=[...itemEntries].sort((a,b)=>{ const ua=csGetEffectiveUp(a)??Infinity,ub=csGetEffectiveUp(b)??Infinity; return ua-ub; });
    const validUPs=sorted.map(e=>csGetEffectiveUp(e)).filter(u=>u!==null);
    const minUp=validUPs.length?Math.min(...validUPs):null;
    const tieCount=minUp!==null?validUPs.filter(u=>parseFloat(u.toFixed(2))===parseFloat(minUp.toFixed(2))).length:0;

    const section=document.createElement('div'); section.className='cs-section'+(stage===0?' closed':'');
    const hdr=document.createElement('div'); hdr.className='cs-header'; hdr.onclick=e=>{ e.stopPropagation(); csToggle(item.id); };
    const main=document.createElement('div'); main.className='cs-header-main';
    const nameEl=document.createElement('div'); nameEl.className='cs-item-name'; nameEl.textContent=item.name;
    main.appendChild(nameEl);

    if(stage===0&&minUp!==null){
      const RANK_COLORS=[{solo:'#30a85a',tied:'#90e0b0'},{solo:'#347ab8',tied:'#90c4e8'},{solo:'#7c58a8',tied:'#c0aadc'}];
      function fmtUp(u){ return u!==null?parseFloat(u.toFixed(2)):null; }
      function isTiedPrice(u){ const f=fmtUp(u); return sorted.filter(x=>fmtUp(csGetEffectiveUp(x))===f).length>1; }
      const count=Math.min(csPreviewCount,sorted.length);
      let displayRank=0,lastFmt=null;
      for(let i=0;i<count;i++){
        const e=sorted[i]; const up=csGetEffectiveUp(e); if(up===null) continue;
        const fmt=fmtUp(up); if(lastFmt!==null&&fmt!==lastFmt) displayRank++;
        lastFmt=fmt;
        const isTied=isTiedPrice(up); const col=RANK_COLORS[Math.min(displayRank,2)]; const color=isTied?col.tied:col.solo;
        const sub=document.createElement('div');
        sub.style.cssText=`font-size:9px;font-weight:700;color:${color};letter-spacing:0.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;`;
        let saleText = '';
        if(isSaleActive(e)){
          const endD=new Date(e.sale.ends+'T00:00:00');
          const now=new Date(); now.setHours(0,0,0,0);
          const diff=Math.round((endD-now)/(1000*60*60*24));
          if(diff<=0) saleText='Ends Today';
          else if(diff===1) saleText='Ends Tomorrow';
          else saleText='Ends '+(endD.getMonth()+1)+'/'+endD.getDate()+'/'+String(endD.getFullYear()).slice(2);
        }
        sub.textContent=e.store+' · $'+up.toFixed(2)+'/'+unit.label;
        if(saleText){
          const saleSuffix=document.createElement('span');
          saleSuffix.style.cssText='color:#d97f30;font-weight:800;';
          saleSuffix.textContent=' (SALE! '+saleText+')';
          sub.appendChild(saleSuffix);
        }
        main.appendChild(sub);
      }
    } else if(stage>0){
      const badge=document.createElement('div'); badge.className='cs-unit-badge';
      badge.textContent=unit.label+(itemEntries.length?' · '+itemEntries.length:''); main.appendChild(badge);
    }

    const right=document.createElement('div'); right.className='cs-header-right';
    const arr=document.createElement('div'); arr.className='cs-arrow'; arr.textContent=stage===0?'▼':'▲'; right.appendChild(arr);
    hdr.append(main,right); section.appendChild(hdr);

    if(stage>0){
      const body=document.createElement('div'); body.className='cs-body';
      // cat/unit card
      const cuRow=document.createElement('div');
      cuRow.style.cssText='height:var(--drop-height);display:flex;border:var(--border-width) solid var(--border-color);border-radius:var(--radius);overflow:hidden;flex-shrink:0;';
      const catBtn=document.createElement('button');
      catBtn.style.cssText=`flex:1;min-width:0;border:none;border-right:var(--border-width) solid var(--border-color);background:var(--bg-2);color:${getCat(item.category).color};font-size:10px;font-weight:800;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 8px;`;
      catBtn.textContent=getCat(item.category).label; catBtn.onclick=()=>openMsCatModal(item.id);
      const unitBtn=document.createElement('button');
      unitBtn.style.cssText='flex:1;min-width:0;border:none;background:var(--bg-2);color:var(--muted);font-size:10px;font-weight:800;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 8px;';
      unitBtn.textContent=getUnit(item.unit||'unit').label; unitBtn.onclick=()=>openMsUnitModal(item.id);
      cuRow.append(catBtn,unitBtn); body.appendChild(cuRow);
      // add entry row
      const addRow=document.createElement('div'); addRow.className='cs-add-row';
      const sI=document.createElement('input'); sI.className='cs-input cs-input-store'; sI.placeholder='Store'; sI.maxLength=30; sI.dataset.itemId=item.id;
      const qI=document.createElement('input'); qI.className='cs-input cs-input-qty'; qI.placeholder='Quantity'; qI.type='number'; qI.min='0'; qI.step='any'; qI.dataset.qtyId=item.id;
      const pI=document.createElement('input'); pI.className='cs-input cs-input-price'; pI.placeholder='Price'; pI.type='number'; pI.min='0'; pI.step='any'; pI.dataset.priceId=item.id;
      const aBtn=document.createElement('button'); aBtn.className='cs-add-btn'; aBtn.textContent='+';
      addRow.append(sI,qI,pI,aBtn); body.appendChild(addRow);
      // sale add row
      const saleAddRow=document.createElement('div'); saleAddRow.className='cs-sale-add-row';
      const slbl=document.createElement('div'); slbl.className='cs-sale-label'; slbl.textContent='SALE';
      const spI=document.createElement('input'); spI.className='cs-input'; spI.placeholder='Sale Price'; spI.type='number'; spI.min='0'; spI.step='any'; spI.style.cssText='flex:1;min-width:0;'; spI.dataset.salePriceId=item.id;
      const todayLocal=new Date(); const pad=n=>String(n).padStart(2,'0');
      const todayStr=todayLocal.getFullYear()+'-'+pad(todayLocal.getMonth()+1)+'-'+pad(todayLocal.getDate());
      const edI=document.createElement('input'); edI.className='cs-input'; edI.type='date'; edI.min=todayStr; edI.style.cssText='flex:2;min-width:0;color-scheme:dark;'; edI.dataset.saleEndId=item.id;
      const clrBtn=document.createElement('button'); clrBtn.className='cs-entry-del'; clrBtn.textContent='×';
      clrBtn.onclick=()=>{ spI.value=''; edI.value=''; const ents=ls('cs_entries',[]); ents.forEach(e=>{ if(e.itemId===item.id&&e.sale) delete e.sale; }); lsSet('cs_entries',ents); csRender(); };
      saleAddRow.append(slbl,spI,edI,clrBtn); body.appendChild(saleAddRow);
      // doAdd defined after spI/edI so closure captures them correctly
      const doAdd=()=>csAddEntry(item.id,sI.value.trim(),qI.value,pI.value,spI.value,edI.value.trim());
      aBtn.onclick=doAdd; [sI,qI,pI].forEach(i=>i.addEventListener('keydown',e=>{ if(e.key==='Enter') doAdd(); }));

      if(sorted.length>0){
        const divEl=document.createElement('div'); divEl.className='cs-divider'; body.appendChild(divEl);
        sorted.forEach(entry=>{
          const up=csGetEffectiveUp(entry);
          const hasSale=isSaleActive(entry);
          const isBest=up!==null&&minUp!==null&&parseFloat(up.toFixed(2))===parseFloat(minUp.toFixed(2));
          const isTied=isBest&&tieCount>1;
          const row=document.createElement('div'); row.className='cs-entry';
          const top=document.createElement('div'); top.className='cs-entry-top';
          const editSq=document.createElement('div'); editSq.className='cs-entry-edit'+(csEditPend.has(entry.id)?' pending':''); editSq.textContent='≡'; editSq.dataset.id=entry.id;
          editSq.onclick=e=>{ e.stopPropagation(); const id=e.currentTarget.dataset.id;
            if(csEditPend.has(id)){ csEditPend.delete(id); csEditEntry(id,item.id); }
            else { csEditPend.add(id); editSq.className='cs-entry-edit pending'; setTimeout(()=>{ csEditPend.delete(id); editSq.className='cs-entry-edit'; },2000); }
          };
          const regularUp=entry.qty>0?entry.price/entry.qty:null;
          const st=document.createElement('div'); st.className='cs-store'; st.textContent=entry.store;
          const upEl=document.createElement('div'); upEl.className='cs-up'+(isTied?' tied':isBest?' best':'');
          upEl.textContent=regularUp!==null?'$'+regularUp.toFixed(2)+'/'+unit.label:'—';
          const dt=document.createElement('div'); dt.className='cs-date';
          if(entry.updated){ const d=new Date(entry.updated); dt.textContent=(d.getMonth()+1)+'/'+d.getDate()+'/'+String(d.getFullYear()).slice(2); } else dt.textContent='—';
          const dBtn=document.createElement('button'); dBtn.className='cs-entry-del'+(csEntDelPend.has(entry.id)?' pending':''); dBtn.textContent='×';
          dBtn.onclick=()=>{ if(csEntDelPend.has(entry.id)){ csDeleteEntry(entry.id); } else { csEntDelPend.add(entry.id); dBtn.className='cs-entry-del pending'; setTimeout(()=>{ csEntDelPend.delete(entry.id); csRender(); },2000); } };
          top.append(editSq,st,upEl,dt,dBtn); row.appendChild(top);
          if(hasSale){
            const saleUp=entry.sale.price/entry.qty;
            const saving=regularUp!==null?(regularUp-saleUp):null;
            const saleRow=document.createElement('div'); saleRow.className='cs-entry-sale';
            const sv=document.createElement('div'); sv.className='cs-sale-saving'; sv.textContent=saving!==null?'SAVE $'+saving.toFixed(2)+'/'+unit.label:'—';
            const sp=document.createElement('div'); sp.className='cs-sale-price'; sp.textContent='$'+saleUp.toFixed(2)+'/'+unit.label;
            const ed=document.createElement('div'); ed.className='cs-sale-enddate';
            const endD=new Date(entry.sale.ends+'T00:00:00');
            ed.textContent='ENDS '+(endD.getMonth()+1)+'/'+endD.getDate()+'/'+String(endD.getFullYear()).slice(2);
            saleRow.append(sv,sp,ed); row.appendChild(saleRow);
          }
          body.appendChild(row);
        });
      }
      section.appendChild(body);
    }
    return section;
  }

  // SIMPLE — flat item cards under category dividers
  if(csViewMode==='simple'){
    cats.forEach(cat=>{
      const catItems=displayItems.filter(i=>i.category===cat.id);
      const div=document.createElement('div'); div.className='simple-cat-divider';
      const l1=document.createElement('div'); l1.className='simple-cat-divider-line';
      const lbl=document.createElement('span'); lbl.className='simple-cat-divider-label'; lbl.textContent=cat.label; lbl.style.color=cat.color;
      const l2=document.createElement('div'); l2.className='simple-cat-divider-line';
      div.append(l1,lbl,l2); container.appendChild(div);
      catItems.forEach(item=>container.appendChild(buildCsItem(item)));
    });
    return;
  }

  // CATEGORY — items nested inside category dropdown cards
  cats.forEach(cat=>{
    const catItems=displayItems.filter(i=>i.category===cat.id);
    const cStage=getCsStage('cat_'+cat.id);
    const catSection=buildCatSection(cat,catItems,cStage,()=>{
      const cur=getCsStage('cat_'+cat.id);
      if(cur===0){ Object.keys(csOpenState).forEach(k=>{ if(k.startsWith('cat_')) csOpenState[k]=0; }); csOpenState['cat_'+cat.id]=1; }
      else csOpenState['cat_'+cat.id]=0;
      csRender();
    }, body=>{
      catItems.forEach(item=>body.appendChild(buildCsItem(item)));
    });
    container.appendChild(catSection);
  });
}
