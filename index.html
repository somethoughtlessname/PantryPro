const msDelPend=new Set();
const msAddedSet=new Set();

function updateMsBtn(){
  document.getElementById('msCatLabel').textContent=getCat(msSelectedCat).label;
}

function msPopulate(name,category){
  const items=ls('ms_items',[]);
  if(items.some(i=>i.name.toLowerCase()===name.toLowerCase())) return;
  items.push({id:'ms_'+Date.now()+Math.random(),name,category,unit:'unit'});
  lsSet('ms_items',items);
}

function msAdd(){
  const inp=document.getElementById('msInput'), name=inp.value.trim(); if(!name) return;
  msPopulate(name,msSelectedCat); inp.value=''; inp.focus(); msRender(); csRender();
}

function msDelete(id){
  msDelPend.delete(id);
  lsSet('ms_items',ls('ms_items',[]).filter(i=>i.id!==id));
  // remove all comp shop entries for this item
  lsSet('cs_entries',ls('cs_entries',[]).filter(e=>e.itemId!==id));
  msRender(); csRender();
}

function msSetUnit(id, unitId){
  const items=ls('ms_items',[]);
  const item=items.find(i=>i.id===id); if(!item) return;
  item.unit=unitId; lsSet('ms_items',items);
  msRender(); csRender();
}

function msSetCat(id, catId){
  const items=ls('ms_items',[]);
  const item=items.find(i=>i.id===id); if(!item) return;
  item.category=catId; lsSet('ms_items',items);
  // sync grocery list items with matching name
  const gl=ls('gl_items',[]);
  let changed=false;
  gl.forEach(g=>{ if(g.name.toLowerCase()===item.name.toLowerCase()){ g.category=catId; changed=true; } });
  if(changed) lsSet('gl_items',gl);
  msRender(); glRender();
}

function msAddToGrocery(id){
  const item=ls('ms_items',[]).find(i=>i.id===id); if(!item) return;
  const gl=ls('gl_items',[]);
  if(!gl.some(i=>i.name.toLowerCase()===item.name.toLowerCase()&&!i.checked)){
    gl.push({id:'gl_'+Date.now()+Math.random(),name:item.name,category:item.category,checked:false});
    lsSet('gl_items',gl);
    trackCatUsage(item.category);
    glRender();
  }
  msAddedSet.add(id); msRender();
  setTimeout(()=>{ msAddedSet.delete(id); msRender(); },1500);
}

function getMsStage(catId){ return msOpenState[catId]!==undefined?msOpenState[catId]:0; }

function msToggleCat(catId){
  const cur=getMsStage(catId);
  if(cur===0){ Object.keys(msOpenState).forEach(k=>msOpenState[k]=0); msOpenState[catId]=1; }
  else msOpenState[catId]=0;
  msRender();
}

const msEditPend = new Set();
const msEditingId = {current: null};

function msSaveName(id, newName){
  newName = newName.trim();
  if(!newName) return;
  const items = ls('ms_items',[]);
  const item = items.find(i=>i.id===id); if(!item) return;
  const oldName = item.name;
  item.name = newName;
  lsSet('ms_items', items);
  // sync grocery list
  const gl = ls('gl_items',[]);
  gl.forEach(g=>{ if(g.name.toLowerCase()===oldName.toLowerCase()) g.name=newName; });
  lsSet('gl_items', gl);
  msEditingId.current = null;
  msRender(); glRender();
}

function msBuildRow(item){
  const isAdded=msAddedSet.has(item.id), isPend=msDelPend.has(item.id);
  const onList=ls('gl_items',[]).some(i=>i.name.toLowerCase()===item.name.toLowerCase()&&!i.checked);
  const cat=getCat(item.category);
  const unit=getUnit(item.unit||'unit');
  const isEditing = msEditingId.current === item.id;

  const row=document.createElement('div'); row.className='item-row';

  // add to grocery check
  const addSq=document.createElement('div'); addSq.className='item-check';
  if(isAdded){
    addSq.style.background='var(--color-4)'; addSq.style.color='#fff'; addSq.textContent='✓';
  } else if(onList){
    addSq.style.background='#fff';
    const dot=document.createElement('div');
    dot.style.cssText='width:12px;height:12px;border-radius:50%;background:var(--color-4);flex-shrink:0;';
    addSq.appendChild(dot);
  } else {
    addSq.style.background='#fff'; addSq.style.color='var(--color-4)';
    addSq.style.fontSize='16px'; addSq.style.fontWeight='700'; addSq.textContent='+';
  }
  addSq.style.cursor='pointer';
  addSq.dataset.id=item.id;
  addSq.onclick=e=>{ e.stopPropagation(); msAddToGrocery(e.currentTarget.dataset.id); };

  // name — either static or input
  let nm;
  if(isEditing){
    nm=document.createElement('input');
    nm.style.cssText='flex:1;min-width:0;background:var(--bg-3);border:none;border-left:var(--border-width) solid var(--border-color);border-right:var(--border-width) solid var(--border-color);color:var(--color-10);font-size:10px;font-weight:600;padding:0 8px;outline:none;height:100%;';
    nm.value=item.name;
    nm.onclick=e=>e.stopPropagation();
    nm.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.stopPropagation(); msSaveName(item.id,nm.value); } });
    // auto focus without opening keyboard on mobile
    setTimeout(()=>{ nm.focus(); nm.select(); },50);
  } else {
    nm=document.createElement('div'); nm.className='item-name';
    nm.textContent=isAdded?item.name+'  — Added':item.name;
    if(isAdded) nm.style.color='var(--color-4)';
  }

  // edit handle
  const editSq=document.createElement('div');
  editSq.style.cssText=`width:32px;min-width:32px;background:${isEditing?'#fff':'var(--bg-3)'};border-left:var(--border-width) solid var(--border-color);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:${isEditing?'14px':'11px'};font-weight:900;letter-spacing:-1px;`;

  if(isEditing){
    editSq.style.animation='ms-blink-red 0.7s infinite';
    editSq.style.color='var(--color-1)';
    editSq.textContent='✓';
    editSq.onclick=e=>{ e.stopPropagation(); msSaveName(item.id, nm.value||item.name); };
    // add blink keyframes if not already added
    if(!document.getElementById('ms-blink-style')){
      const st=document.createElement('style'); st.id='ms-blink-style';
      st.textContent='@keyframes ms-blink-red{0%,100%{color:var(--color-1)}50%{color:transparent}}@keyframes ms-blink-green{0%,100%{color:var(--color-4)}50%{color:transparent}}';
      document.head.appendChild(st);
    }
  } else {
    editSq.style.color='var(--muted)';
    editSq.textContent='≡';
    editSq.dataset.id=item.id;
    editSq.onclick=e=>{
      e.stopPropagation();
      const id=e.currentTarget.dataset.id;
      if(msEditPend.has(id)){
        msEditPend.delete(id);
        msEditingId.current=id;
        msRender();
      } else {
        msEditPend.add(id);
        editSq.style.background='var(--bg-4)'; editSq.style.color='var(--color-10)';
        setTimeout(()=>{ msEditPend.delete(id); editSq.style.background='var(--bg-3)'; editSq.style.color='var(--muted)'; },2000);
      }
    };
  }

  // unit badge
  const unitBadge=document.createElement('div');
  unitBadge.style.cssText=`width:25%;min-width:0;background:var(--bg-3);border-left:var(--border-width) solid var(--border-color);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);cursor:pointer;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 4px;`;
  unitBadge.textContent=unit.label;
  unitBadge.dataset.id=item.id;
  unitBadge.onclick=e=>{ e.stopPropagation(); openMsUnitModal(e.currentTarget.dataset.id); };

  // delete
  const del=document.createElement('button'); del.className='item-del'+(isPend?' pending':''); del.textContent='×';
  del.dataset.id=item.id;
  del.onclick=e=>{
    e.stopPropagation();
    const id=e.currentTarget.dataset.id;
    if(msDelPend.has(id)){ msDelete(id); }
    else { msDelPend.add(id); del.className='item-del pending'; setTimeout(()=>{ msDelPend.delete(id); msRender(); },2000); }
  };

  row.append(addSq,nm,editSq,unitBadge,del);
  return row;
}

function msPickNextThinkPhrase(){
  const available = MS_THINK_PHRASES.filter(p=>p!==msCurrentThinkPhrase);
  msCurrentThinkPhrase = available[Math.floor(Math.random()*available.length)];
  msThinkCardEl = null;
}

let msThinkPhraseSet = false;

function msSearchInput(){
  clearTimeout(msSearchIdleTimer);
  clearInterval(msThinkTimer);
  const q = (document.getElementById('msSearch')?.value||'').trim();
  if(!q){ msThinkPhraseSet=false; msQuickAddState=null; msQuickAddName=''; msThinkCardEl=null; msRender(); return; }
  // if user types again after idle fired, reset back to thinking
  if(msQuickAddState && msQuickAddState!=='pick-cat'){
    msQuickAddState=null; msThinkCardEl=null; msPickNextThinkPhrase();
  }
  if(!msThinkPhraseSet){ msPickNextThinkPhrase(); msThinkPhraseSet=true; }
  msRender();
  msSearchIdleTimer = setTimeout(()=>{
    clearInterval(msThinkTimer);
    const allItems = ls('ms_items',[]);
    const qWords = q.toLowerCase().split(/\s+/);
    const exists = allItems.some(i=>{
      const nWords = i.name.toLowerCase().split(/\s+/);
      return qWords.every(qw=>nWords.includes(qw));
    });
    msQuickAddState = exists ? 'found' : 'confirm';
    msQuickAddName = q;
    msRender();
  }, 2000);
}


function msRender(){
  const ap=document.getElementById('msAddPanel');
  if(ap) ap.style.display=msShowAddPanel?'':'none';
  const container=document.getElementById('msList'); container.innerHTML='';
  const items=ls('ms_items',[]);
  const query=(document.getElementById('msSearch')?.value||'').trim().toLowerCase();

  const thinkSlot = document.getElementById('msThinkSlot');
  if(thinkSlot && !query) thinkSlot.innerHTML = '';
  if(query){
    const results=items.filter(i=>{
      const words=i.name.toLowerCase().split(/\s+/);
      return words.some(w=>w.startsWith(query));
    }).sort((a,b)=>a.name.localeCompare(b.name));

    // reset quick-add if query changed
    if(msQuickAddName.toLowerCase() !== query){ msQuickAddState=null; msQuickAddName=query; }

    // exact match — all words in query must exactly match words in item name
    const queryWords=query.toLowerCase().split(/\s+/);
    const exactExists=items.some(i=>{
      const nameWords=i.name.toLowerCase().split(/\s+/);
      return queryWords.every(qw=>nameWords.includes(qw));
    });
    const displayName=document.getElementById('msSearch')?.value.trim()||query;

    // show card always while query active
    const qaCard=document.createElement('div');
    qaCard.style.cssText=`height:var(--drop-height);display:flex;border:var(--border-width) solid var(--border-color);border-radius:var(--radius);overflow:hidden;flex-shrink:0;`;

    if(!msQuickAddState){
      // put think card in slot outside list so innerHTML='' never destroys it
      const slot = document.getElementById('msThinkSlot');
      const card = msGetOrCreateThinkCard();
      if(slot && !slot.contains(card)) slot.appendChild(card);
    } else {
      // clear think slot
      const slot = document.getElementById('msThinkSlot');
      if(slot) slot.innerHTML = '';
      if(msQuickAddState==='success'){
        const ph=MS_SUCCESS_PHRASES[Math.floor(Math.random()*MS_SUCCESS_PHRASES.length)];
        const txt=document.createElement('div');
        txt.style.cssText='flex:1;background:var(--bg-2);display:flex;align-items:center;padding:0 10px;font-size:10px;font-weight:600;color:var(--color-4);';
        txt.textContent=ph; qaCard.appendChild(txt);
      } else if(exactExists || msQuickAddState==='found'){
        const ph=MS_FOUND_PHRASES[Math.floor(Math.random()*MS_FOUND_PHRASES.length)];
        const txt=document.createElement('div');
        txt.style.cssText='flex:1;background:var(--bg-2);display:flex;align-items:center;padding:0 10px;font-size:10px;font-weight:600;color:var(--color-4);';
        txt.textContent=ph;
        qaCard.appendChild(txt);
      } else if(msQuickAddState==='confirm'){
        const txt=document.createElement('div');
        txt.style.cssText='flex:1;min-width:0;background:var(--bg-2);display:flex;align-items:center;padding:0 10px;font-size:10px;font-weight:600;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;';
        txt.innerHTML=`Add <strong style="color:var(--color-10);margin:0 4px;">"${displayName}"</strong> to your store?`;
        const yesBtn=document.createElement('div');
        yesBtn.style.cssText='width:48px;min-width:48px;background:#347ab8;border-left:var(--border-width) solid var(--border-color);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;letter-spacing:0.08em;text-transform:uppercase;color:#fff;cursor:pointer;flex-shrink:0;';
        yesBtn.textContent='YES!';
        yesBtn.onclick=e=>{ e.stopPropagation(); msQuickAddName=displayName; msQuickAddState='pick-cat'; msRender(); };
        qaCard.append(txt,yesBtn);
      } else if(msQuickAddState==='pick-cat'){
        const txt=document.createElement('div');
        txt.style.cssText='flex:1;min-width:0;background:var(--bg-2);display:flex;align-items:center;padding:0 10px;font-size:10px;font-weight:600;color:var(--muted);';
        txt.textContent='Pick your category';
        const okBtn=document.createElement('div');
        okBtn.style.cssText='width:48px;min-width:48px;background:var(--color-4);border-left:var(--border-width) solid var(--border-color);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;letter-spacing:0.08em;text-transform:uppercase;color:#000;cursor:pointer;flex-shrink:0;';
        okBtn.textContent='OK!';
        okBtn.onclick=e=>{
          e.stopPropagation();
          window._msQuickAddName=msQuickAddName;
          modalCtx='ms-quickadd'; modalSelPend=null; modalDelPend.clear();
          editingColorCatId=null; selectedRootIdx=0; newCatColor=ROOT_COLORS[0].shades[2];
          document.getElementById('modalTitle').textContent='Category';
          buildModalGrid();
          document.getElementById('modalOverlay').classList.add('open');
        };
        qaCard.append(txt,okBtn);
      }
      container.appendChild(qaCard);
    }
    if(results.length) results.forEach(item=>container.appendChild(msBuildRow(item)));
    return;
  }
  msQuickAddState=null; msQuickAddName='';

  // all cats alphabetically, including empty ones
  const allCats=msGetSortedCats();
  allCats.forEach(cat=>{
    const catItems=items.filter(i=>i.category===cat.id).sort((a,b)=>a.name.localeCompare(b.name));
    const stage=getMsStage(cat.id);
    const section=buildCatSection(cat,catItems,stage,()=>msToggleCat(cat.id),body=>{
      if(msInlineAdd){
        const addRow=document.createElement('div');
        addRow.style.cssText='height:var(--drop-height);display:flex;border:var(--border-width) solid var(--border-color);border-radius:var(--radius);overflow:hidden;flex-shrink:0;';
        const inp=document.createElement('input');
        inp.style.cssText='flex:1;min-width:0;background:var(--bg-3);border:none;color:var(--color-10);font-size:10px;font-weight:600;padding:0 8px;outline:none;';
        inp.placeholder='Add item…'; inp.maxLength=80;
        const addBtn=document.createElement('button');
        addBtn.style.cssText='width:32px;min-width:32px;background:var(--bg-2);border:none;border-left:var(--border-width) solid var(--border-color);color:var(--color-10);font-size:16px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;';
        addBtn.textContent='+';
        const doAdd=()=>{ const name=inp.value.trim(); if(!name) return; msPopulate(name,cat.id); inp.value=''; msRender(); };
        addBtn.onclick=doAdd;
        inp.addEventListener('keydown',e=>{ if(e.key==='Enter') doAdd(); });
        addRow.append(inp,addBtn); body.appendChild(addRow);
      }
      catItems.forEach(item=>body.appendChild(msBuildRow(item)));
    }, '32px');
    section.classList.add('ms');
    container.appendChild(section);
  });
}

let dataTab = 'export';

const DATA_KEYS = [
  'gl_items', 'gl_view',
  'ms_items',
  'cat_custom', 'cat_deleted', 'cat_color_overrides',
  'unit_custom', 'unit_deleted',
  'cs_items', 'cs_entries',
  'setting_cs_preview', 'cs_view',
  'setting_ms_inline_add',
  'setting_ms_add_panel',
  'setting_smart_sort', 'cat_usage',
  'pantry_data',
  // NOTE: pantry_usage is intentionally NOT here — it is never cleared
];

function exportData(){
  const obj = {};
  DATA_KEYS.forEach(k=>{ const v=localStorage.getItem(k); if(v!==null) obj[k]=JSON.parse(v); });
  return JSON.stringify(obj, null, 2);
}

function importData(json){
  try {
    const obj = JSON.parse(json);
    DATA_KEYS.forEach(k=>{ if(obj[k]!==undefined) localStorage.setItem(k, JSON.stringify(obj[k])); });
    return true;
  } catch(e){ return false; }
}

function openDataWindow(){
  closeSettings();
  dataTab='export';
  document.getElementById('dataWindow').classList.add('open');
  renderDataBody();
}

function closeDataWindow(){
  document.getElementById('dataWindow').classList.remove('open');
}

function setDataTab(t){
  dataTab=t;
  document.getElementById('dtExport').classList.toggle('active', t==='export');
  document.getElementById('dtImport').classList.toggle('active', t==='import');
  renderDataBody();
}

function renderDataBody(){
  const body = document.getElementById('dataBody');
  body.innerHTML='';

  const status = document.createElement('div'); status.className='data-status'; status.id='dataStatus';
  body.appendChild(status);

  if(dataTab==='export'){
    const ta = document.createElement('textarea'); ta.className='data-textarea'; ta.readOnly=true;
    ta.value = exportData();
    body.appendChild(ta);

    const btn = document.createElement('button'); btn.className='data-btn green'; btn.textContent='Copy to Clipboard';
    btn.onclick=()=>{
      navigator.clipboard.writeText(ta.value).then(()=>{
        status.textContent='Copied!';
        setTimeout(()=>status.textContent='', 2000);
      }).catch(()=>{
        ta.select(); document.execCommand('copy');
        status.textContent='Copied!';
        setTimeout(()=>status.textContent='', 2000);
      });
    };
    body.appendChild(btn);
  } else {
    const ta = document.createElement('textarea'); ta.className='data-textarea';
    ta.placeholder='Paste exported JSON here…';
    body.appendChild(ta);

    const btn = document.createElement('button'); btn.className='data-btn green'; btn.textContent='Import Data';
    btn.onclick=()=>{
      const ok = importData(ta.value.trim());
      if(ok){
        status.textContent='Imported successfully — reload to apply';
        status.style.color='var(--color-4)';
      } else {
        status.textContent='Invalid data — check your JSON';
        status.style.color='var(--color-1)';
      }
    };
    body.appendChild(btn);
  }
}

function clearAllData(){
  DATA_KEYS.forEach(k=>localStorage.removeItem(k));
  document.getElementById('clearConfirmOverlay').classList.remove('open');
  closeSettings();
  glOpenState={}; msOpenState={}; csOpenState={};
  glRender(); csRender(); msRender();
  updateGlFooterBtn();
}

function renderSalesBody(){
  const body = document.getElementById('salesBody');
  body.innerHTML = '';
  const items = ls('ms_items', []);
  const entries = ls('cs_entries', []);

  const saleEntries = entries.filter(e => isSaleActive(e))
    .sort((a,b)=>{
      const na=items.find(i=>i.id===a.itemId)?.name||'';
      const nb=items.find(i=>i.id===b.itemId)?.name||'';
      return na.localeCompare(nb);
    });

  if(!saleEntries.length){
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.textContent = 'No active sales right now.';
    body.appendChild(empty);
    return;
  }

  saleEntries.forEach(entry=>{
    const item = items.find(i=>i.id===entry.itemId);
    if(!item) return;
    const unit = getUnit(item.unit||'unit');
    const regularUp = entry.qty>0 ? entry.price/entry.qty : null;
    const saleUp = entry.sale.price/entry.qty;
    const saving = regularUp!==null ? regularUp-saleUp : null;
    const endD = new Date(entry.sale.ends+'T00:00:00');
    const now = new Date(); now.setHours(0,0,0,0);
    const diff = Math.round((endD-now)/(1000*60*60*24));
    let endStr;
    if(diff<=0) endStr='Ends Today';
    else if(diff===1) endStr='Ends Tomorrow';
    else endStr='Ends '+(endD.getMonth()+1)+'/'+endD.getDate()+'/'+String(endD.getFullYear()).slice(2);

    const card = document.createElement('div');
    card.style.cssText = `border:var(--border-width) solid var(--border-color);border-radius:var(--radius);overflow:hidden;flex-shrink:0;background:var(--bg-2);`;

    // top — item name + store name centered
    const nameRow = document.createElement('div');
    nameRow.style.cssText = `display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 12px;border-bottom:var(--border-width) solid var(--border-color);gap:3px;`;
    const itemName = document.createElement('div');
    itemName.style.cssText = 'font-size:13px;font-weight:800;letter-spacing:0.06em;text-transform:uppercase;color:var(--color-10);';
    itemName.textContent = item.name;
    const storeName = document.createElement('div');
    storeName.style.cssText = 'font-size:9px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);';
    storeName.textContent = entry.store;
    nameRow.append(itemName, storeName);
    card.appendChild(nameRow);

    // data row — price | savings | date
    const dataRow = document.createElement('div');
    dataRow.style.cssText = `display:flex;align-items:stretch;`;

    // left — regular crossed out + sale price in orange
    const priceCol = document.createElement('div');
    priceCol.style.cssText = 'flex:1;background:var(--bg-3);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 4px;gap:3px;border-right:var(--border-width) solid var(--border-color);';
    const regPrice = document.createElement('div');
    regPrice.style.cssText = 'font-size:9px;font-weight:600;color:var(--muted);text-decoration:line-through;';
    regPrice.textContent = regularUp!==null ? '$'+regularUp.toFixed(2)+'/'+unit.label : '—';
    const salePriceEl = document.createElement('div');
    salePriceEl.style.cssText = 'font-size:11px;font-weight:800;color:#d97f30;';
    salePriceEl.textContent = '$'+saleUp.toFixed(2)+'/'+unit.label;
    priceCol.append(regPrice, salePriceEl);

    // middle — SAVINGS! + amount
    const savCol = document.createElement('div');
    savCol.style.cssText = 'flex:1;background:#374151;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 4px;gap:3px;border-right:var(--border-width) solid var(--border-color);';
    const savLabel = document.createElement('div');
    savLabel.style.cssText = 'font-size:8px;font-weight:900;letter-spacing:0.12em;text-transform:uppercase;color:#7dd4a8;';
    savLabel.textContent = 'SAVINGS!';
    const savAmt = document.createElement('div');
    savAmt.style.cssText = 'font-size:11px;font-weight:800;color:#7dd4a8;';
    savAmt.textContent = saving!==null ? '$'+saving.toFixed(2)+'/'+unit.label : '—';
    savCol.append(savLabel, savAmt);

    // right — end date

function getPantryData(){ return ls('pantry_data',{}); }
function setPantryData(d){ lsSet('pantry_data',d); }
function getItemPantry(id){
  const d=getPantryData();
  if(!d[id]) d[id]={containers:[],totalCap:0,step:1};
  return d[id];
}
function saveItemPantry(id,pd){ const d=getPantryData(); d[id]=pd; setPantryData(d); }

function getPtUsage(){ return ls('pantry_usage',{}); }
function trackPtUsage(id,amount){
  if(amount<=0) return;
  const u=getPtUsage(); u[id]=(u[id]||0)+amount; lsSet('pantry_usage',u);
  // also log timestamped event for stats graphs
  const log=ls('pantry_usage_log',[]); log.push({id,amount,ts:Date.now()}); lsSet('pantry_usage_log',log);
}

function ptGetStatsValues(id, mode){
  const log=ls('pantry_usage_log',[]);
  const now=new Date();
  const todayMidnight=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const values=new Array(12).fill(0);
  log.filter(e=>e.id===id).forEach(e=>{
    const d=new Date(e.ts);
    if(mode==='daily'){
      const eMidnight=new Date(d.getFullYear(),d.getMonth(),d.getDate());
      const diffDays=Math.round((todayMidnight-eMidnight)/(1000*60*60*24));
      const idx=11-diffDays;
      if(idx>=0&&idx<=11) values[idx]+=e.amount;
    } else if(mode==='weekly'){
      const diffWeeks=Math.floor((now-d)/(1000*60*60*24*7));
      const idx=11-diffWeeks;
      if(idx>=0&&idx<=11) values[idx]+=e.amount;
    } else {
      const diffMonths=(now.getFullYear()-d.getFullYear())*12+(now.getMonth()-d.getMonth());
      const idx=11-diffMonths;
      if(idx>=0&&idx<=11) values[idx]+=e.amount;
    }
  });
  return values.map(v=>parseFloat(v.toFixed(2)));
}

function ptGetStock(pd){ return parseFloat(pd.containers.reduce((s,c)=>s+c.amount,0).toFixed(1)); }
function ptGetMax(pd){ return pd.totalCap; }
function ptGetStatus(pd){ const max=ptGetMax(pd); if(max<=0) return 'ok'; const ratio=ptGetStock(pd)/max; if(ratio<=1/6) return 'low'; if(ratio<=1/3) return 'soon'; return 'ok'; }
function ptFillColor(pd){ const st=ptGetStatus(pd); if(st==='ok') return '#48a971'; if(st==='soon') return '#5A8DB8'; return '#C85A5A'; }
function ptConFillColor(con){ const ratio=con.cap>0?con.amount/con.cap:0; if(ratio<=1/6) return '#C85A5A'; if(ratio<=1/3) return '#5A8DB8'; return '#48a971'; }
function ptDarken(hex,pct){ let c=hex.replace('#',''); if(c.length===3) c=c[0]+c[0]+c[1]+c[1]+c[2]+c[2]; const r=Math.max(0,Math.round(parseInt(c.slice(0,2),16)*(1-pct))); const g=Math.max(0,Math.round(parseInt(c.slice(2,4),16)*(1-pct))); const b=Math.max(0,Math.round(parseInt(c.slice(4,6),16)*(1-pct))); return `rgb(${r},${g},${b})`; }

function ptSmartSortItems(items){ if(!smartSort) return items; const usage=getPtUsage(); return [...items].sort((a,b)=>(usage[b.id]||0)-(usage[a.id]||0)); }

/* ── Pantry search ── */
let ptQuickAddState=null;
let ptQuickAddName='';
let ptQuickAddCat=null;
let ptQuickAddUnit=null;
let ptSearchIdleTimer=null;
let ptThinkPhraseSet=false;
let ptCurrentThinkPhrase=null;
let ptThinkCardEl=null;

function ptPickNextThinkPhrase(){
  const available=MS_THINK_PHRASES.filter(p=>p!==ptCurrentThinkPhrase);
  ptCurrentThinkPhrase=available[Math.floor(Math.random()*available.length)];
  ptThinkCardEl=null;
}

function ptGetOrCreateThinkCard(){
  if(ptThinkCardEl) return ptThinkCardEl;
  const card=document.createElement('div');
  card.style.cssText=`height:32px;display:flex;border:3px solid #000;border-radius:8px;overflow:hidden;flex-shrink:0;`;
  const txt=document.createElement('div');
  txt.style.cssText='flex:1;background:var(--bg-2);display:flex;align-items:center;padding:0 10px;font-size:10px;font-weight:600;color:var(--muted);font-style:italic;';
  const phraseText=ptCurrentThinkPhrase.replace(/[.…]+$/,'');
  txt.innerHTML=phraseText+'<span class="thinking-dots" style="font-style:normal;margin-left:1px;"><span>.</span><span>.</span><span>.</span></span>';
  card.appendChild(txt); ptThinkCardEl=card; return card;
}

function ptSearchInput(){
  clearTimeout(ptSearchIdleTimer);
  const q=(document.getElementById('ptSearch')?.value||'').trim();
  if(!q){
    ptThinkPhraseSet=false; ptQuickAddState=null; ptQuickAddName=''; ptThinkCardEl=null;
    ptShowSearchMode(false); return;
  }
  if(ptQuickAddState && ptQuickAddState!=='pick-cat' && ptQuickAddState!=='pick-unit'){
    ptQuickAddState=null; ptThinkCardEl=null; ptPickNextThinkPhrase();
  }
  if(!ptThinkPhraseSet){ ptPickNextThinkPhrase(); ptThinkPhraseSet=true; }
  ptShowSearchMode(true, q);
  ptSearchIdleTimer=setTimeout(()=>{
    const allItems=ls('ms_items',[]);
    const qLower=q.toLowerCase().trim();
    const exists=allItems.some(i=>i.name.toLowerCase().trim()===qLower);
    ptQuickAddState=exists?'found':'confirm';
    ptQuickAddName=q;
    ptRenderThinkSlot(q);
  },2000);
}

// show/hide search mode without rebuilding DOM
function ptShowSearchMode(searching, q){
  const page=document.getElementById('pagePantry');
  const viewTog=page.querySelector('.pt-view-toggle');
  const filterBar=page.querySelector('.pt-filter-bar');
  const itemsWrap=page.querySelector('.pt-items-wrap');
  if(!searching){
    if(viewTog) viewTog.style.display='';
    if(filterBar) filterBar.style.display='';
    if(itemsWrap) itemsWrap.style.display='';
    const slot=document.getElementById('ptThinkSlot'); if(slot) slot.innerHTML='';
    return;
  }
  if(viewTog) viewTog.style.display='none';
  if(filterBar) filterBar.style.display='none';

  // update think slot — show thinking card immediately
  ptRenderThinkSlot(q);

  if(itemsWrap){
    itemsWrap.innerHTML='';
    itemsWrap.style.cssText='display:flex;flex-direction:column;gap:4px;';
    const allItems=ls('ms_items',[]);
    const qLower=(q||'').toLowerCase();
    const matches=allItems.filter(i=>{
      const words=i.name.toLowerCase().split(/\s+/);
      return words.some(w=>w.startsWith(qLower));
    });
    if(matches.length===0){ itemsWrap.style.display='none'; }
    else { matches.forEach(item=>itemsWrap.appendChild(ptBuildCard(item))); }
  }
}

function ptRenderThinkSlot(q){
  const slot=document.getElementById('ptThinkSlot'); if(!slot) return;
  const items=ls('ms_items',[]);
  slot.innerHTML='';
  if(!q){ return; }
  if(!ptQuickAddState){
    slot.appendChild(ptGetOrCreateThinkCard()); return;
  }
  if(ptQuickAddState==='success'){
    const card=document.createElement('div'); card.style.cssText=`height:32px;display:flex;border:3px solid #000;border-radius:8px;overflow:hidden;flex-shrink:0;`;
    const txt=document.createElement('div'); txt.style.cssText='flex:1;background:var(--bg-2);display:flex;align-items:center;padding:0 10px;font-size:10px;font-weight:600;color:var(--color-4);';
    txt.textContent=MS_SUCCESS_PHRASES[Math.floor(Math.random()*MS_SUCCESS_PHRASES.length)]; card.appendChild(txt); slot.appendChild(card); return;
  }
  if(ptQuickAddState==='found'){
    const card=document.createElement('div'); card.style.cssText=`height:32px;display:flex;border:3px solid #000;border-radius:8px;overflow:hidden;flex-shrink:0;`;
    const txt=document.createElement('div'); txt.style.cssText='flex:1;background:var(--bg-2);display:flex;align-items:center;padding:0 10px;font-size:10px;font-weight:600;color:var(--color-4);';
    txt.textContent=MS_FOUND_PHRASES[Math.floor(Math.random()*MS_FOUND_PHRASES.length)]; card.appendChild(txt); slot.appendChild(card); return;
  }
  if(ptQuickAddState==='confirm'){
    const card=document.createElement('div'); card.style.cssText=`height:32px;display:flex;border:3px solid #000;border-radius:8px;overflow:hidden;flex-shrink:0;`;
    const txt=document.createElement('div'); txt.style.cssText='flex:1;background:var(--bg-2);display:flex;align-items:center;padding:0 10px;font-size:10px;font-weight:600;color:var(--color-10);';
    txt.textContent=`Add "${q}"?`;
    const yesBtn=document.createElement('div'); yesBtn.style.cssText='width:56px;min-width:56px;background:#1d3f5c;border-left:3px solid #000;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;color:#fff;cursor:pointer;';
    yesBtn.textContent='YES!'; yesBtn.onclick=e=>{ e.stopPropagation(); ptQuickAddState='pick-cat'; ptOpenCatModal(); };
    card.append(txt,yesBtn); slot.appendChild(card); return;
  }
  if(ptQuickAddState==='pick-cat'){
    const card=document.createElement('div'); card.style.cssText=`height:32px;display:flex;border:3px solid #000;border-radius:8px;overflow:hidden;flex-shrink:0;`;
    const txt=document.createElement('div'); txt.style.cssText='flex:1;background:var(--bg-2);display:flex;align-items:center;padding:0 10px;font-size:10px;font-weight:600;color:var(--color-10);'; txt.textContent='Pick a category...';
    const btn=document.createElement('div'); btn.style.cssText='width:72px;min-width:72px;background:#1d442d;border-left:3px solid #000;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;color:#fff;cursor:pointer;'; btn.textContent='OK!'; btn.onclick=e=>{ e.stopPropagation(); ptOpenCatModal(); };
    card.append(txt,btn); slot.appendChild(card); return;
  }
  if(ptQuickAddState==='pick-unit'){
    const card=document.createElement('div'); card.style.cssText=`height:32px;display:flex;border:3px solid #000;border-radius:8px;overflow:hidden;flex-shrink:0;`;
    const txt=document.createElement('div'); txt.style.cssText='flex:1;background:var(--bg-2);display:flex;align-items:center;padding:0 10px;font-size:10px;font-weight:600;color:var(--color-10);'; txt.textContent='Pick a unit...';
    const btn=document.createElement('div'); btn.style.cssText='width:72px;min-width:72px;background:#3d1a5c;border-left:3px solid #000;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;color:#fff;cursor:pointer;'; btn.textContent='OF COURSE!'; btn.onclick=e=>{ e.stopPropagation(); ptOpenUnitModal(); };
    card.append(txt,btn); slot.appendChild(card); return;
  }
}

function ptOpenCatModal(){
  modalCtx='pt-quickadd-cat'; modalSelPend=null; modalDelPend.clear();
  editingColorCatId=null; selectedRootIdx=0; newCatColor=ROOT_COLORS[0].shades[2];
  document.getElementById('modalTitle').textContent='Category';
  buildModalGrid(); document.getElementById('modalOverlay').classList.add('open');
}

function ptOpenUnitModal(){
  modalCtx='pt-quickadd-unit'; modalSelPend=null; modalDelPend.clear();
  document.getElementById('modalTitle').textContent='Unit';
  buildModalGrid(); document.getElementById('modalOverlay').classList.add('open');
}

function ptQuickAddFinalise(){
  if(!ptQuickAddName||!ptQuickAddCat||!ptQuickAddUnit) return;
  const newItem={id:'ms_'+Date.now()+Math.random(),name:ptQuickAddName,category:ptQuickAddCat,unit:ptQuickAddUnit};
  const ms=ls('ms_items',[]); ms.push(newItem); lsSet('ms_items',ms);
  ptQuickAddState='success'; ptQuickAddName=''; ptQuickAddCat=null; ptQuickAddUnit=null;
  ptThinkPhraseSet=false; ptThinkCardEl=null;
  const q=(document.getElementById('ptSearch')?.value||'').trim();
  ptRender();
  if(q){ ptRenderThinkSlot(q); ptShowSearchMode(true,q); }
  msRender();
}

function ptRender(){
  ptCardRegistry=[];
  ptApplyFilter();
  const page=document.getElementById('pagePantry');
  // preserve search wrap and think slot, clear only content below
  const searchWrap=page.querySelector('.ms-search-wrap');
  const thinkSlot=page.querySelector('#ptThinkSlot');
  page.innerHTML='';
  if(searchWrap) page.appendChild(searchWrap);
  if(thinkSlot){ page.appendChild(thinkSlot); const q=(document.getElementById('ptSearch')?.value||'').trim(); ptRenderThinkSlot(q); }
  else { const ts=document.createElement('div'); ts.id='ptThinkSlot'; page.appendChild(ts); }

  const msItems=ls('ms_items',[]);
  if(msItems.length===0){ const empty=document.createElement('div'); empty.style.cssText='display:flex;align-items:center;justify-content:center;padding:40px;font-size:10px;font-weight:600;color:var(--muted);font-style:italic;text-align:center;'; empty.textContent='No items in My Store yet. Add items there to track them here.'; page.appendChild(empty); return; }
  const q=(document.getElementById('ptSearch')?.value||'').trim();
  if(!q){
    const tog=ptBuildViewToggle(); tog.className+=' pt-view-toggle'; page.appendChild(tog);
    const fb=ptBuildFilterBar(); page.appendChild(fb);
  }
  if(ptFilterSnapshot.length===0 && !q){
    const empty=document.createElement('div');
    empty.style.cssText='display:flex;align-items:center;justify-content:center;padding:20px 16px;font-size:10px;font-weight:600;color:var(--muted);font-style:italic;text-align:center;border:3px solid #000;border-radius:8px;background:var(--bg-2);';
    empty.textContent=ptActiveFilter==='low' ? ptGetCriticalMsg() : 'No items in this category';
    page.appendChild(empty); return;
  }
  if(q) return;
  const itemsWrap=document.createElement('div'); itemsWrap.className='pt-items-wrap'; itemsWrap.style.cssText='display:flex;flex-direction:column;gap:4px;';
  const cats=[...new Set(ptFilterSnapshot.map(i=>i.category))];
  cats.forEach(catId=>{ const catItems=ptSmartSortItems(ptFilterSnapshot.filter(i=>i.category===catId)); const cat=getCat(catId); itemsWrap.appendChild(ptDivider(cat.label,cat.color)); catItems.forEach(item=>itemsWrap.appendChild(ptBuildCard(item))); });
  page.appendChild(itemsWrap);
}

glRender(); csRender(); msRender();
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./sw.js')
      .then(r=>console.log('[PantryPro] SW registered', r.scope))
      .catch(e=>console.log('[PantryPro] SW failed', e));
  });
}
</script>
</body>
</html>
